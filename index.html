<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Tracker</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, system-ui;
  background: #000;
  color: #fff;
}

.hidden { display: none; }

.top {
  display: flex;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid #1c1c1e;
}

.btn {
  flex: 1;
  padding: 10px;
  border-radius: 12px;
  background: #1c1c1e;
  color: #0a84ff;
  font-size: 14px;
  text-align: center;
}

.btn.disabled {
  opacity: 0.4;
}

.actions {
  display: flex;
  gap: 12px;
  padding: 12px 16px;
}

.circle-wrap {
  display: flex;
  justify-content: center;
  margin-top: 40px;
}

.circle {
  width: 240px;
  height: 240px;
  border-radius: 50%;
  background: #1c1c1e;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
}

.circle.running {
  background: #0a84ff;
}

input[type="file"] { display: none; }
</style>
</head>
<body>

<!-- PROJECT BUTTONS -->
<div class="top">
  <div class="btn disabled" id="toCrypto">Зачислити в Crypto</div>
  <div class="btn disabled" id="toUapp">Зачислити в UAPP</div>
</div>

<!-- CSV -->
<div class="actions">
  <div class="btn" id="exportBtn">Експорт CSV</div>
  <div class="btn" id="importBtn">Імпорт CSV</div>
  <input type="file" id="fileInput" accept=".csv">
</div>

<!-- TIMER -->
<div class="circle-wrap">
  <div class="circle" id="circle">
    <div id="time">00:00:00</div>
  </div>
</div>

<script>
/* ===== CONFIG ===== */
const PROJECTS = ["Crypto", "UAPP"];
const DAY_START_HOUR = 5;

/* ===== STATE ===== */
let state = JSON.parse(localStorage.getItem("timerState")) || {
  isRunning: false,
  startedAt: null,
  elapsedMs: 0
};

let data = JSON.parse(localStorage.getItem("projectsData")) || {
  Crypto: {},
  UAPP: {}
};

/* ===== ELEMENTS ===== */
const circle = document.getElementById("circle");
const timeEl = document.getElementById("time");
const toCrypto = document.getElementById("toCrypto");
const toUapp = document.getElementById("toUapp");
const exportBtn = document.getElementById("exportBtn");
const importBtn = document.getElementById("importBtn");
const fileInput = document.getElementById("fileInput");

/* ===== TIME HELPERS ===== */
function format(ms) {
  const total = Math.floor(ms / 1000);
  const h = String(Math.floor(total / 3600)).padStart(2,"0");
  const m = String(Math.floor((total % 3600) / 60)).padStart(2,"0");
  const s = String(total % 60).padStart(2,"0");
  return `${h}:${m}:${s}`;
}

function getWorkDate() {
  const d = new Date();
  if (d.getHours() < DAY_START_HOUR) d.setDate(d.getDate() - 1);
  return d.toISOString().slice(0,10);
}

function currentElapsed() {
  if (!state.isRunning) return state.elapsedMs;
  return state.elapsedMs + (Date.now() - state.startedAt);
}

/* ===== UI UPDATE ===== */
function render() {
  const ms = currentElapsed();
  timeEl.textContent = format(ms);

  circle.classList.toggle("running", state.isRunning);

  const canAssign = !state.isRunning && ms > 0;
  toCrypto.classList.toggle("disabled", !canAssign);
  toUapp.classList.toggle("disabled", !canAssign);
}

/* ===== TIMER TOGGLE ===== */
circle.onclick = () => {
  if (!state.isRunning) {
    state.isRunning = true;
    state.startedAt = Date.now();
  } else {
    state.elapsedMs += Date.now() - state.startedAt;
    state.startedAt = null;
    state.isRunning = false;
  }
  localStorage.setItem("timerState", JSON.stringify(state));
  render();
};

/* ===== ASSIGN TIME ===== */
function assign(project) {
  if (state.isRunning || state.elapsedMs === 0) return;

  const day = getWorkDate();
  data[project][day] = (data[project][day] || 0) + state.elapsedMs;

  state.elapsedMs = 0;
  localStorage.setItem("projectsData", JSON.stringify(data));
  localStorage.setItem("timerState", JSON.stringify(state));
  render();
}

toCrypto.onclick = () => assign("Crypto");
toUapp.onclick = () => assign("UAPP");

/* ===== CSV ===== */
exportBtn.onclick = () => {
  let csv = "project,date,ms\n";
  PROJECTS.forEach(p => {
    Object.entries(data[p]).forEach(([d,v]) => {
      csv += `${p},${d},${v}\n`;
    });
  });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], {type:"text/csv"}));
  a.download = "time-tracker.csv";
  a.click();
};

importBtn.onclick = () => fileInput.click();
fileInput.onchange = e => {
  const r = new FileReader();
  r.onload = () => {
    r.result.split("\n").slice(1).forEach(l => {
      if (!l.trim()) return;
      const [p,d,v] = l.split(",");
      if (!data[p]) data[p] = {};
      data[p][d] = (data[p][d] || 0) + Number(v);
    });
    localStorage.setItem("projectsData", JSON.stringify(data));
    alert("Імпорт завершено");
  };
  r.readAsText(e.target.files[0]);
};

/* ===== START ===== */
render();
setInterval(render, 1000);
</script>
</body>
</html>
