<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Time</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<style>
:root{
  --bg:#000;
  --glass:rgba(28,28,30,.72);
  --stroke:rgba(255,255,255,.18);
  --stroke-soft:rgba(255,255,255,.08);
  --accent:#0A84FF;
  --radius:22px;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,system-ui;
}

.hidden{display:none}

/* ===== COMMON ===== */
.btn,.card,.timer,.day-card{
  background:var(--glass);
  backdrop-filter:blur(26px);
  border-radius:var(--radius);
  border:1px solid var(--stroke);
  box-shadow:inset 0 0 0 1px var(--stroke-soft);
}

.btn{
  padding:14px;
  text-align:center;
  color:var(--accent);
  font-size:16px;
  white-space:nowrap;
}
.btn:active{transform:scale(.97)}

/* ===== TOP ===== */
.top{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:14px;
}

/* ===== PROJECT LIST ===== */
.list{
  padding:14px;
  display:grid;
  gap:14px;
}
.project{
  padding:16px;
}
.project-title{
  font-size:18px;
}
.project-sub{
  font-size:13px;
  opacity:.7;
  margin-top:4px;
}

/* ===== TIMER ===== */
.timer-wrap{
  display:flex;
  justify-content:center;
  margin:30px 0 20px;
}
.timer{
  width:260px;
  height:260px;
  border-radius:50%;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  font-weight:600;
  transition:background .25s ease, box-shadow .25s ease;
}
.timer.active{
  background:rgba(10,132,255,.22);
  border-color:rgba(10,132,255,.55);
  box-shadow:
    inset 0 0 0 1px rgba(10,132,255,.35),
    0 0 40px rgba(10,132,255,.25);
}
.timer .time{position:relative;z-index:2}
.timer .wave{
  position:absolute;
  left:-50%;
  bottom:-35%;
  width:200%;
  height:200%;
  background:rgba(255,255,255,.08);
  border-radius:45%;
  z-index:1;
  opacity:0;
}
.timer.active .wave{
  opacity:1;
  animation:waveMove 6s linear infinite;
}
@keyframes waveMove{
  from{transform:translateX(0) rotate(0deg)}
  to{transform:translateX(50%) rotate(360deg)}
}

/* ===== DAYS ===== */
.days{
  padding:14px;
  display:grid;
  gap:10px;
}
.day-card{
  display:flex;
  justify-content:space-between;
  padding:12px 14px;
  font-size:15px;
}

/* ===== BOTTOM ===== */
.bottom{
  position:fixed;
  left:0; right:0; bottom:0;
  padding:14px;
  background:linear-gradient(
    to top,
    rgba(0,0,0,.9),
    rgba(0,0,0,.4)
  );
}

input[type=file]{display:none}
</style>
</head>

<body>

<!-- ================= HOME ================= -->
<div id="home">
  <div class="top">
    <div class="btn" onclick="exportCSV()">Експорт CSV</div>
    <div class="btn" onclick="importCSV()">Імпорт CSV</div>
    <input type="file" id="fileInput">
  </div>

  <div class="list">
    <div class="card project" onclick="openProject('Crypto')">
      <div class="project-title">Crypto</div>
      <div class="project-sub" id="today-Crypto"></div>
    </div>
    <div class="card project" onclick="openProject('UAPP')">
      <div class="project-title">UAPP</div>
      <div class="project-sub" id="today-UAPP"></div>
    </div>
  </div>

  <div class="timer-wrap">
    <div id="mainTimer" class="timer">
      <div class="wave"></div>
      <span class="time">00:00:00</span>
    </div>
  </div>
</div>

<!-- ================= PROJECT ================= -->
<div id="projectView" class="hidden">
  <div class="top">
    <div class="btn" onclick="goHome()">← Назад</div>
  </div>

  <div class="timer-wrap">
    <div id="projectTimer" class="timer">
      <div class="wave"></div>
      <span class="time">00:00:00</span>
    </div>
  </div>

  <div class="days" id="daysList"></div>
</div>

<!-- ================= BOTTOM ================= -->
<div id="bottomBar" class="bottom">
  <div class="btn" onclick="goHome()">Головна</div>
</div>

<script>
/* ===== UTILS ===== */
function fmt(ms){
  const s=Math.floor(ms/1000);
  return `${Math.floor(s/3600)}:${String(Math.floor(s%3600/60)).padStart(2,"0")}`;
}
function fmtFull(ms){
  const s=Math.floor(ms/1000);
  return [
    String(Math.floor(s/3600)).padStart(2,"0"),
    String(Math.floor(s%3600/60)).padStart(2,"0"),
    String(s%60).padStart(2,"0")
  ].join(":");
}
function getDayKey(){
  const d=new Date(Date.now()-5*3600000);
  return d.toISOString().slice(0,10);
}

/* ===== MAIN TIMER ===== */
let main={running:false,elapsed:0,start:0};
const mainTimer=document.getElementById("mainTimer");
mainTimer.onclick=()=>{
  main.running=!main.running;
  mainTimer.classList.toggle("active",main.running);
  if(main.running){main.start=Date.now();tickMain();}
  else main.elapsed+=Date.now()-main.start;
};
function tickMain(){
  mainTimer.querySelector(".time").textContent=fmtFull(
    main.elapsed+(Date.now()-main.start)
  );
  if(main.running)requestAnimationFrame(tickMain);
}

/* ===== PROJECT TIMER ===== */
let currentProject=null,proj={running:false,elapsed:0,start:0};
const projectTimer=document.getElementById("projectTimer");

function openProject(name){
  currentProject=name;
  home.classList.add("hidden");
  projectView.classList.remove("hidden");
  loadDays();
}
function goHome(){
  projectView.classList.add("hidden");
  home.classList.remove("hidden");
  renderToday();
}

projectTimer.onclick=()=>{
  proj.running=!proj.running;
  projectTimer.classList.toggle("active",proj.running);
  if(proj.running){proj.start=Date.now();tickProj();}
  else{
    const delta=Date.now()-proj.start;
    proj.elapsed+=delta;
    saveDay(delta);
  }
};
function tickProj(){
  projectTimer.querySelector(".time").textContent=fmtFull(
    proj.elapsed+(Date.now()-proj.start)
  );
  if(proj.running)requestAnimationFrame(tickProj);
}

/* ===== DAYS ===== */
function saveDay(delta){
  const key=`${currentProject}_days`;
  const days=JSON.parse(localStorage.getItem(key)||"{}");
  const day=getDayKey();
  days[day]=(days[day]||0)+delta;
  localStorage.setItem(key,JSON.stringify(days));
}
function loadDays(){
  const key=`${currentProject}_days`;
  const days=JSON.parse(localStorage.getItem(key)||"{}");
  const list=document.getElementById("daysList");
  list.innerHTML="";
  Object.keys(days).sort().reverse().forEach(d=>{
    const el=document.createElement("div");
    el.className="day-card";
    el.innerHTML=`<span>${d.slice(8,10)}.${d.slice(5,7)}</span><span>${fmt(days[d])}</span>`;
    list.appendChild(el);
  });
}

/* ===== TODAY LABELS ===== */
function renderToday(){
  ["Crypto","UAPP"].forEach(p=>{
    const days=JSON.parse(localStorage.getItem(`${p}_days`)||"{}");
    const t=days[getDayKey()];
    document.getElementById(`today-${p}`).textContent=
      t?`Сьогодні ${fmt(t)}`:"";
  });
}
renderToday();

/* ===== CSV ===== */
function exportCSV(){
  let csv="key,value\n";
  Object.keys(localStorage).forEach(k=>csv+=`${k},${localStorage[k]}\n`);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download="work-time.csv";
  a.click();
}
function importCSV(){fileInput.click()}
fileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>r.result.split("\n").slice(1).forEach(l=>{
    if(!l)return;
    const [k,v]=l.split(",");
    localStorage.setItem(k,v);
  });
  r.readAsText(e.target.files[0]);
};
</script>

</body>
</html>
