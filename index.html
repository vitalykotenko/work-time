<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Time</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<style>
:root{
  --bg:#000;
  --glass:rgba(28,28,30,.72);
  --stroke:rgba(255,255,255,.28);
  --accent:#0A84FF;
  --radius:22px;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,system-ui;
}

/* ===== COMMON ===== */
.hidden{display:none}
.btn, .card, .timer{
  position:relative;
  background:var(--glass);
  backdrop-filter:blur(26px);
  border-radius:var(--radius);
  overflow:hidden;
}

/* ===== CORNER STROKES ===== */
.btn::before,
.card::before,
.timer::before{
  content:"";
  position:absolute;
  top:0; right:0;
  width:40%;
  height:1px;
  background:linear-gradient(to left, var(--stroke), transparent);
}

.btn::after,
.card::after,
.timer::after{
  content:"";
  position:absolute;
  bottom:0; left:0;
  width:40%;
  height:1px;
  background:linear-gradient(to right, var(--stroke), transparent);
}

/* ===== BUTTON ===== */
.btn{
  padding:14px;
  text-align:center;
  color:var(--accent);
  font-size:16px;
  white-space:nowrap;
}
.btn:active{transform:scale(.97)}

/* ===== TOP ===== */
.top{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:14px;
}

/* ===== PROJECTS ===== */
.projects{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  padding:6px 14px;
}
.project{
  padding:22px 0;
  text-align:center;
  font-size:18px;
}

/* ===== ASSIGN ===== */
.assign{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:14px;
}

/* ===== TIMER ===== */
.timer-wrap{
  display:flex;
  justify-content:center;
  margin:30px 0 90px;
}
.timer{
  width:260px;
  height:260px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  font-weight:600;
}
.timer.active{
  box-shadow:0 0 0 2px rgba(10,132,255,.25);
}

/* ===== BOTTOM ===== */
.bottom{
  position:fixed;
  left:0; right:0; bottom:0;
  padding:14px;
  background:linear-gradient(
    to top,
    rgba(0,0,0,.9),
    rgba(0,0,0,.4)
  );
}

/* ===== LIST ===== */
.list{
  padding:14px;
  display:grid;
  gap:14px;
}
.plus{
  font-size:26px;
  color:#aaa;
}

/* ===== HEADER ===== */
.header{
  padding:14px;
}

input[type=file]{display:none}
</style>
</head>

<body>

<!-- ================= HOME ================= -->
<div id="home">

  <div class="top">
    <div class="btn" onclick="exportCSV()">Експорт CSV</div>
    <div class="btn" onclick="importCSV()">Імпорт CSV</div>
    <input type="file" id="fileInput">
  </div>

  <div class="projects">
    <div class="card project">Crypto</div>
    <div class="card project">UAPP</div>
  </div>

  <div class="assign">
    <div class="btn">Зачислити в Crypto</div>
    <div class="btn">Зачислити в UAPP</div>
  </div>

  <div class="timer-wrap">
    <div id="mainTimer" class="timer">00:00:00</div>
  </div>

</div>

<!-- ================= PROJECTS ================= -->
<div id="projectsView" class="hidden">

  <div class="header">
    <div class="btn" onclick="goHome()">← Назад</div>
  </div>

  <div class="list" id="projectsList">
    <div class="card project plus" onclick="addProject()">＋</div>
  </div>

</div>

<!-- ================= PROJECT ================= -->
<div id="projectView" class="hidden">

  <div class="header">
    <div class="btn" onclick="backToProjects()">← Назад</div>
  </div>

  <div class="timer-wrap">
    <div id="projectTimer" class="timer">00:00:00</div>
  </div>

</div>

<!-- ================= BOTTOM (HOME ONLY) ================= -->
<div id="bottomBar" class="bottom">
  <div class="btn" onclick="openProjects()">Проєкти</div>
</div>

<script>
/* ===== MAIN TIMER ===== */
const KEY="main_timer";
let state=JSON.parse(localStorage.getItem(KEY))||{
  running:false,elapsed:0,startedAt:0
};
let raf;
const mainTimer=document.getElementById("mainTimer");

function fmt(ms){
  const s=Math.floor(ms/1000);
  return [
    String(Math.floor(s/3600)).padStart(2,"0"),
    String(Math.floor(s%3600/60)).padStart(2,"0"),
    String(s%60).padStart(2,"0")
  ].join(":");
}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function render(){
  const now=state.running
    ? state.elapsed+(Date.now()-state.startedAt)
    : state.elapsed;
  mainTimer.textContent=fmt(now);
  if(state.running)raf=requestAnimationFrame(render);
}
mainTimer.onclick=()=>{
  state.running=!state.running;
  mainTimer.classList.toggle("active",state.running);
  if(state.running){
    state.startedAt=Date.now(); render();
  }else{
    state.elapsed+=Date.now()-state.startedAt;
    state.startedAt=0; cancelAnimationFrame(raf);
  }
  save();
};
mainTimer.classList.toggle("active",state.running);
render();

/* ===== NAV ===== */
const bottomBar=document.getElementById("bottomBar");

function openProjects(){
  home.classList.add("hidden");
  projectsView.classList.remove("hidden");
  bottomBar.classList.add("hidden");
}
function goHome(){
  projectsView.classList.add("hidden");
  projectView.classList.add("hidden");
  home.classList.remove("hidden");
  bottomBar.classList.remove("hidden");
}
function backToProjects(){
  projectView.classList.add("hidden");
  projectsView.classList.remove("hidden");
}

/* ===== PROJECTS ===== */
let projects=JSON.parse(localStorage.getItem("projects")||"[]");
const list=document.getElementById("projectsList");

function renderProjects(){
  list.innerHTML='<div class="card project plus" onclick="addProject()">＋</div>';
  projects.forEach(p=>{
    const d=document.createElement("div");
    d.className="card project";
    d.textContent=p;
    d.onclick=()=>openProject(p);
    list.appendChild(d);
  });
}
function addProject(){
  const name=prompt("Назва проєкту");
  if(!name)return;
  projects.unshift(name);
  localStorage.setItem("projects",JSON.stringify(projects));
  renderProjects();
}
renderProjects();

/* ===== PROJECT TIMER ===== */
let currentProject=null,projState,projRaf;
const projectTimer=document.getElementById("projectTimer");

function openProject(name){
  currentProject=name;
  projectsView.classList.add("hidden");
  projectView.classList.remove("hidden");

  const key="proj_"+name;
  projState=JSON.parse(localStorage.getItem(key))||{
    running:false,elapsed:0,startedAt:0
  };
  projectTimer.classList.toggle("active",projState.running);
  renderProject();
}
function renderProject(){
  const now=projState.running
    ? projState.elapsed+(Date.now()-projState.startedAt)
    : projState.elapsed;
  projectTimer.textContent=fmt(now);
  if(projState.running)projRaf=requestAnimationFrame(renderProject);
}
projectTimer.onclick=()=>{
  projState.running=!projState.running;
  projectTimer.classList.toggle("active",projState.running);
  if(projState.running){
    projState.startedAt=Date.now(); renderProject();
  }else{
    projState.elapsed+=Date.now()-projState.startedAt;
    projState.startedAt=0; cancelAnimationFrame(projRaf);
  }
  localStorage.setItem("proj_"+currentProject,JSON.stringify(projState));
};

/* ===== CSV ===== */
function exportCSV(){
  let csv="key,value\n";
  Object.keys(localStorage).forEach(k=>csv+=`${k},${localStorage[k]}\n`);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download="work-time.csv";
  a.click();
}
function importCSV(){fileInput.click()}
fileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>{
    r.result.split("\n").slice(1).forEach(l=>{
      if(!l)return;
      const [k,v]=l.split(",");
      localStorage.setItem(k,v);
    });
    alert("Імпортовано");
  };
  r.readAsText(e.target.files[0]);
};
</script>

</body>
</html>
