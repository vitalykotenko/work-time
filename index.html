<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Work Time Pro</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000">

<style>
:root{
  --bg:#000;
  --glass:rgba(28,28,30,.72);
  --glass-light:rgba(58,58,60,.55);
  --stroke:rgba(255,255,255,.18);
  --accent:#0A84FF;
  --radius:22px;
  --red:#ff453a;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,system-ui;
  padding-bottom: 40px;
}
.hidden{display:none !important}

.btn,.card,.day{
  background:var(--glass);
  backdrop-filter:blur(26px);
  -webkit-backdrop-filter:blur(26px);
  border-radius:var(--radius);
  border:1px solid var(--stroke);
}
.btn{padding:14px;text-align:center;color:var(--accent);font-weight:600;cursor:pointer;margin-bottom:10px}
.btn:active{opacity:0.7}

.days{padding:14px;display:grid;gap:10px}
.day{display:flex;justify-content:space-between;padding:16px;transition:background 0.2s}
.day.active{background:rgba(10,132,255,0.2);border-color:var(--accent)}

.header{padding:20px 14px 10px;display:flex;justify-content:space-between;align-items:center}
.view-title{font-size:24px;font-weight:bold}

input{
  background:rgba(255,255,255,0.05);
  border:1px solid var(--stroke);
  border-radius:12px;
  color:#fff;
  font-size:18px;
  text-align:center;
  outline:none;
}
</style>
</head>

<body>

<div id="projectView">
  <div class="header">
    <div class="view-title">Проекти</div>
    <div class="btn" style="margin:0;padding:8px 16px" onclick="openTrash()">Кошик</div>
  </div>
  <div class="days" id="daysList"></div>
</div>

<div id="dayEditView" class="hidden">
  <div class="header">
    <div class="btn" style="margin:0" onclick="closeDayEditor()">← Назад</div>
    <div class="view-title">Редагувати</div>
  </div>
  <div class="card" style="margin:14px;padding:20px">
    <label style="display:block;margin-bottom:10px;color:#8e8e93">Час (HH:MM:SS)</label>
    <input id="dayTimeInput" type="text" placeholder="00:00:00" style="width:100%;padding:14px">
  </div>
  <div class="bottom" style="padding:14px">
    <div class="btn" style="background:var(--accent);color:#fff" onclick="saveDayEdit()">Зберегти</div>
    <div class="btn" style="color:var(--red)" onclick="deleteDay()">Видалити запис</div>
  </div>
</div>

<div id="trashView" class="hidden">
  <div class="header">
    <div class="btn" style="margin:0" onclick="closeTrash()">← Назад</div>
    <div class="view-title">Кошик</div>
  </div>
  <div class="days" id="trashList"></div>
</div>

<script>
// Вспомогательные функции
const fmt = t => {
  const s = Math.floor(t / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return [h, m, sec].map(v => String(v).padStart(2, "0")).join(":");
};

const parseTime = str => {
  const p = str.split(":").map(Number);
  const h = p[0] || 0, m = p[1] || 0, s = p[2] || 0;
  return (h * 3600 + m * 60 + s) * 1000;
};

let selectedDayKey = null;
let longPressTimer;
let isLongPress = false;

// Логика списка
function loadDays() {
  const list = document.getElementById("daysList");
  list.innerHTML = "";
  
  // Получаем ключи и сортируем их (по дате в ключе day_YYYY-MM-DD)
  const keys = Object.keys(localStorage)
    .filter(k => k.startsWith("day_"))
    .sort((a, b) => b.localeCompare(a));

  keys.forEach(k => {
    const row = document.createElement("div");
    row.className = "day";
    row.innerHTML = `<span>${k.replace("day_", "")}</span><b>${fmt(+localStorage[k])}</b>`;

    // Обработка долгого нажатия для мобилок
    row.addEventListener("touchstart", () => {
      isLongPress = false;
      longPressTimer = setTimeout(() => {
        isLongPress = true;
        selectedDayKey = k;
        openDayEditor();
      }, 600);
    });

    row.addEventListener("touchend", () => clearTimeout(longPressTimer));

    row.onclick = () => {
      if (isLongPress) return;
      document.querySelectorAll(".day").forEach(d => d.classList.remove("active"));
      row.classList.add("active");
    };

    list.appendChild(row);
  });
}

// Редактор
function openDayEditor() {
  document.getElementById("projectView").classList.add("hidden");
  document.getElementById("dayEditView").classList.remove("hidden");
  document.getElementById("dayTimeInput").value = fmt(+localStorage[selectedDayKey] || 0);
}

function closeDayEditor() {
  document.getElementById("dayEditView").classList.add("hidden");
  document.getElementById("projectView").classList.remove("hidden");
}

function saveDayEdit() {
  const val = document.getElementById("dayTimeInput").value;
  localStorage[selectedDayKey] = parseTime(val);
  closeDayEditor();
  loadDays();
}

function deleteDay() {
  const trash = JSON.parse(localStorage.deletedDays || "[]");
  trash.push({ key: selectedDayKey, value: localStorage[selectedDayKey], date: Date.now() });
  localStorage.deletedDays = JSON.stringify(trash);
  
  delete localStorage[selectedDayKey];
  closeDayEditor();
  loadDays();
}

// Корзина
function openTrash() {
  document.getElementById("projectView").classList.add("hidden");
  document.getElementById("trashView").classList.remove("hidden");
  renderTrash();
}

function closeTrash() {
  document.getElementById("trashView").classList.add("hidden");
  document.getElementById("projectView").classList.remove("hidden");
}

function renderTrash() {
  const tList = document.getElementById("trashList");
  tList.innerHTML = "";
  const trash = JSON.parse(localStorage.deletedDays || "[]");
  
  if(trash.length === 0) tList.innerHTML = "<div style='text-align:center;color:#8e8e93'>Кошик порожній</div>";

  trash.forEach((item, idx) => {
    const d = document.createElement("div");
    d.className = "day";
    d.innerHTML = `<span>${item.key}</span><span style="color:var(--accent)">Відновити</span>`;
    d.onclick = () => {
      localStorage[item.key] = item.value;
      trash.splice(idx, 1);
      localStorage.deletedDays = JSON.stringify(trash);
      renderTrash();
      loadDays();
    };
    tList.appendChild(d);
  });
}

// Инициализация
if (!localStorage.day_2024_05_20) localStorage.day_2024_05_20 = 28800000; 
loadDays();
</script>

</body>
</html>
