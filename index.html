<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Time</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<style>
:root{
  --bg:#000;
  --glass:rgba(28,28,30,.72);
  --stroke:rgba(255,255,255,.18);
  --stroke-soft:rgba(255,255,255,.08);
  --accent:#0A84FF;
  --radius:22px;
  --sub:#8E8E93;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,system-ui;
}
.hidden{display:none}

/* ===== COMMON ===== */
.btn,.card,.timer,.day{
  background:var(--glass);
  backdrop-filter:blur(26px);
  border-radius:var(--radius);
  border:1px solid var(--stroke);
  box-shadow:inset 0 0 0 1px var(--stroke-soft);
}

.btn{
  padding:14px;
  text-align:center;
  color:var(--accent);
  font-size:16px;
  white-space:nowrap;
}
.btn:active{transform:scale(.97)}
.btn.disabled{opacity:.35;pointer-events:none}

.card{padding:18px}

/* ===== TOP ===== */
.top{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:14px;
}

/* ===== PROJECTS ===== */
.projects{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  padding:6px 14px;
}
.project .name{font-size:18px}
.project .today{
  margin-top:6px;
  font-size:13px;
  color:var(--sub);
}

/* ===== ASSIGN ===== */
.assign{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:14px;
}

/* ===== TIMER ===== */
.timer-wrap{
  display:flex;
  justify-content:center;
  margin:30px 0 24px;
}
.timer{
  width:260px;
  height:260px;
  border-radius:50%;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  font-weight:600;
}
.timer.active{
  background:rgba(10,132,255,.25);
  border-color:rgba(10,132,255,.55);
  box-shadow:0 0 40px rgba(10,132,255,.35);
}
.timer .time{z-index:2}

/* ===== WAVE ===== */
.wave{
  position:absolute;
  left:-50%;
  top:0;
  width:200%;
  height:200%;
  background:
    linear-gradient(
      90deg,
      rgba(10,132,255,.35),
      rgba(10,132,255,.15),
      rgba(10,132,255,.35)
    );
  border-radius:45%;
  opacity:0;
}
.timer.active .wave{
  opacity:1;
  animation:wave 8s linear infinite;
}
@keyframes wave{
  from{transform:translateX(-25%) rotate(0deg)}
  to{transform:translateX(25%) rotate(360deg)}
}

/* ===== DAYS ===== */
.days{
  padding:14px;
  display:grid;
  gap:10px;
}
.day{
  display:flex;
  justify-content:space-between;
  padding:12px 14px;
  font-size:15px;
}
.day.active{
  background:rgba(10,132,255,.18);
  border-color:rgba(10,132,255,.55);
}

/* ===== HEADER ===== */
.header{padding:14px}

/* ===== BOTTOM ===== */
.bottom{
  position:fixed;
  left:0;right:0;bottom:0;
  padding:14px;
  background:linear-gradient(to top,rgba(0,0,0,.9),rgba(0,0,0,.4));
}

input[type=file]{display:none}
</style>
</head>

<body>

<!-- ===== HOME ===== -->
<div id="home">
  <div class="top">
    <div class="btn" onclick="exportCSV()">Експорт CSV</div>
    <div class="btn" onclick="importCSV()">Імпорт CSV</div>
    <input type="file" id="fileInput">
  </div>

  <div class="projects">
    <div class="card project" onclick="openProject('Crypto')">
      <div class="name">Crypto</div>
      <div class="today" id="today_crypto">Сьогодні 00:00</div>
    </div>
    <div class="card project" onclick="openProject('UAPP')">
      <div class="name">UAPP</div>
      <div class="today" id="today_uapp">Сьогодні 00:00</div>
    </div>
  </div>

  <div class="assign">
    <div class="btn disabled" id="assignCrypto" onclick="assign('Crypto')">Зачислити в Crypto</div>
    <div class="btn disabled" id="assignUapp" onclick="assign('UAPP')">Зачислити в UAPP</div>
  </div>

  <div class="timer-wrap">
    <div id="mainTimer" class="timer">
      <div class="wave"></div>
      <span class="time">00:00:00</span>
    </div>
  </div>
</div>

<!-- ===== PROJECT ===== -->
<div id="projectView" class="hidden">
  <div class="header">
    <div class="btn" onclick="goHome()">← Назад</div>
  </div>

  <div class="timer-wrap">
    <div id="projectTimer" class="timer">
      <div class="wave"></div>
      <span class="time">00:00:00</span>
    </div>
  </div>

  <div class="days" id="daysList"></div>
</div>

<script>
/* ===== HELPERS ===== */
const daysUA=["Нд","Пн","Вт","Ср","Чт","Пт","Сб"];
function fmt(ms){
  const s=Math.floor(ms/1000);
  return String(Math.floor(s/3600)).padStart(2,"0")+":"+
         String(Math.floor(s%3600/60)).padStart(2,"0");
}
function fmtFull(ms){
  const s=Math.floor(ms/1000);
  return String(Math.floor(s/3600)).padStart(2,"0")+":"+
         String(Math.floor(s%3600/60)).padStart(2,"0")+":"+
         String(s%60).padStart(2,"0");
}
function dayKey(){
  const d=new Date(Date.now()-5*3600000);
  return d.toISOString().slice(0,10);
}

/* ===== MAIN TIMER ===== */
let main={running:false,elapsed:0,start:0};
const mainTimer=document.getElementById("mainTimer");

function renderMain(){
  const now=main.running
    ? main.elapsed+(Date.now()-main.start)
    : main.elapsed;
  mainTimer.querySelector(".time").textContent=fmtFull(now);
  updateAssignButtons();
  if(main.running)requestAnimationFrame(renderMain);
}
mainTimer.onclick=()=>{
  main.running=!main.running;
  mainTimer.classList.toggle("active",main.running);
  if(main.running){
    main.start=Date.now();
    renderMain();
  }else{
    main.elapsed+=Date.now()-main.start;
  }
};
renderMain();

/* ===== ASSIGN ===== */
function assign(project){
  if(main.elapsed<=0)return;
  const key=`proj_${project}_days`;
  const days=JSON.parse(localStorage.getItem(key)||"{}");
  const d=dayKey();
  days[d]=(days[d]||0)+main.elapsed;
  localStorage.setItem(key,JSON.stringify(days));
  main.elapsed=0;
  main.running=false;
  mainTimer.classList.remove("active");
  renderMain();
  updateToday();
}

/* ===== ASSIGN BUTTON STATE ===== */
function updateAssignButtons(){
  const active=main.elapsed>0;
  assignCrypto.classList.toggle("disabled",!active);
  assignUapp.classList.toggle("disabled",!active);
}

/* ===== TODAY ===== */
function updateToday(){
  ["Crypto","UAPP"].forEach(p=>{
    const days=JSON.parse(localStorage.getItem(`proj_${p}_days`)||"{}");
    document.getElementById("today_"+p.toLowerCase()).textContent=
      "Сьогодні "+fmt(days[dayKey()]||0);
  });
}
updateToday();

/* ===== NAV ===== */
let currentProject=null;
function openProject(name){
  currentProject=name;
  home.classList.add("hidden");
  projectView.classList.remove("hidden");
  loadProjectDays();
}
function goHome(){
  projectView.classList.add("hidden");
  home.classList.remove("hidden");
  updateToday();
}

/* ===== PROJECT TIMER ===== */
let proj={running:false,elapsed:0,start:0};
const projectTimer=document.getElementById("projectTimer");

projectTimer.onclick=()=>{
  proj.running=!proj.running;
  projectTimer.classList.toggle("active",proj.running);
  if(proj.running){
    proj.start=Date.now();
    renderProject();
  }else{
    const delta=Date.now()-proj.start;
    proj.elapsed+=delta;
    saveProject(delta);
  }
};
function renderProject(){
  const now=proj.running
    ? proj.elapsed+(Date.now()-proj.start)
    : proj.elapsed;
  projectTimer.querySelector(".time").textContent=fmtFull(now);
  if(proj.running)requestAnimationFrame(renderProject);
}
function saveProject(delta){
  const key=`proj_${currentProject}_days`;
  const days=JSON.parse(localStorage.getItem(key)||"{}");
  const d=dayKey();
  days[d]=(days[d]||0)+delta;
  localStorage.setItem(key,JSON.stringify(days));
  loadProjectDays();
}

/* ===== DAYS ===== */
function loadProjectDays(){
  const key=`proj_${currentProject}_days`;
  const days=JSON.parse(localStorage.getItem(key)||"{}");
  daysList.innerHTML="";
  Object.keys(days).sort().reverse().forEach(d=>{
    const date=new Date(d);
    const row=document.createElement("div");
    row.className="day";
    row.innerHTML=
      `<span>${d.slice(8,10)}.${d.slice(5,7)} ${daysUA[date.getDay()]}</span>
       <span>${fmt(days[d])}</span>`;
    row.onclick=()=>{
      document.querySelectorAll(".day").forEach(x=>x.classList.remove("active"));
      row.classList.add("active");
    };
    daysList.appendChild(row);
  });
}

/* ===== CSV ===== */
function exportCSV(){
  let csv="";
  Object.keys(localStorage).forEach(k=>csv+=k+","+localStorage[k]+"\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv]));
  a.download="work-time.csv";
  a.click();
}
function importCSV(){fileInput.click()}
fileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>{
    r.result.split("\n").forEach(l=>{
      const [k,v]=l.split(",");
      if(k)localStorage[k]=v;
    });
    updateToday();
  };
  r.readAsText(e.target.files[0]);
};
</script>
</body>
</html>
