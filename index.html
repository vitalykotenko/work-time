<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Time</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000">

<style>
:root{
  --bg:#000;
  --glass:rgba(28,28,30,.72);
  --glass-light:rgba(58,58,60,.55);
  --stroke:rgba(255,255,255,.18);
  --stroke-soft:rgba(255,255,255,.08);
  --accent:#0A84FF;
  --radius:22px;
  --sub:#8E8E93;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,system-ui;
}
.hidden{display:none}

/* COMMON */
.btn,.card,.timer,.day{
  background:var(--glass);
  backdrop-filter:blur(26px);
  border-radius:var(--radius);
  border:1px solid var(--stroke);
  box-shadow:inset 0 0 0 1px var(--stroke-soft);
}
.btn{
  padding:14px;
  text-align:center;
  color:var(--accent);
  font-size:16px;
  white-space:nowrap;
}
.btn:active{transform:scale(.97)}
.btn.disabled{opacity:.35;pointer-events:none}
.card{padding:18px}

/* TOP */
.top{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:14px;
}

/* HOME PROJECTS */
.projects{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  padding:6px 14px;
}
.project .name{font-size:18px}
.project .today{
  margin-top:6px;
  font-size:13px;
  color:var(--sub);
}

/* ASSIGN */
.assign{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:14px;
}

/* TIMER */
.timer-wrap{
  display:flex;
  justify-content:center;
  margin:30px 0 24px;
}
.timer{
  width:260px;
  height:260px;
  border-radius:50%;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  font-weight:600;
}
.timer.active{
  background:rgba(10,132,255,.25);
  border-color:rgba(10,132,255,.55);
  box-shadow:0 0 40px rgba(10,132,255,.35);
}
.timer .time{z-index:2}

/* WAVE */
.wave{
  position:absolute;
  left:-50%;
  top:0;
  width:200%;
  height:200%;
  background:linear-gradient(
    90deg,
    rgba(10,132,255,.35),
    rgba(10,132,255,.15),
    rgba(10,132,255,.35)
  );
  border-radius:45%;
  opacity:0;
}
.timer.active .wave{
  opacity:1;
  animation:wave 8s linear infinite;
}
@keyframes wave{
  from{transform:translateX(-25%) rotate(0deg)}
  to{transform:translateX(25%) rotate(360deg)}
}

/* DAYS */
.days{
  padding:14px;
  display:grid;
  gap:10px;
}
.day{
  display:flex;
  justify-content:space-between;
  padding:12px 14px;
  font-size:15px;
}
.day.active{
  background:rgba(10,132,255,.18);
  border-color:rgba(10,132,255,.55);
}

/* HEADER / BOTTOM */
.header{padding:14px}
.bottom{
  position:fixed;
  left:0;right:0;bottom:0;
  padding:14px;
  background:linear-gradient(to top,rgba(0,0,0,.9),rgba(0,0,0,.4));
}

/* SECONDARY */
.secondary-list{
  padding:14px;
  display:grid;
  gap:14px;
}
.plus{
  background:var(--glass-light);
  font-size:28px;
  text-align:center;
  padding:22px 0;
  color:#aaa;
}

input[type=file]{display:none}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <div class="top">
    <div class="btn" onclick="exportCSV()">Експорт CSV</div>
    <div class="btn" onclick="importCSV()">Імпорт CSV</div>
    <input type="file" id="fileInput">
  </div>

  <div class="projects">
    <div class="card project" onclick="openMainProject('Crypto')">
      <div class="name">Crypto</div>
      <div class="today" id="today_crypto">Сьогодні 00:00</div>
    </div>
    <div class="card project" onclick="openMainProject('UAPP')">
      <div class="name">UAPP</div>
      <div class="today" id="today_uapp">Сьогодні 00:00</div>
    </div>
  </div>

  <div class="assign">
    <div class="btn disabled" id="assignCrypto" onclick="assignMain('Crypto')">Зачислити в Crypto</div>
    <div class="btn disabled" id="assignUapp" onclick="assignMain('UAPP')">Зачислити в UAPP</div>
  </div>

  <div class="timer-wrap">
    <div id="mainTimer" class="timer">
      <div class="wave"></div>
      <span class="time">00:00:00</span>
    </div>
  </div>
</div>

<!-- SECONDARY PROJECTS -->
<div id="projectsView" class="hidden">
  <div class="header">
    <div class="btn" onclick="goHome()">← Назад</div>
  </div>
  <div class="secondary-list" id="secondaryList">
    <div class="card plus" onclick="addSecondary()">＋</div>
  </div>
</div>

<!-- PROJECT -->
<div id="projectView" class="hidden">
  <div class="header">
    <div class="btn" onclick="backFromProject()">← Назад</div>
  </div>
  <div class="timer-wrap">
    <div id="projectTimer" class="timer">
      <div class="wave"></div>
      <span class="time">00:00:00</span>
    </div>
  </div>
  <div class="days" id="daysList"></div>
</div>

<div class="bottom" id="bottomBar">
  <div class="btn" onclick="openSecondary()">Проєкти</div>
</div>

<script>
/* HELPERS */
const daysUA=["Нд","Пн","Вт","Ср","Чт","Пт","Сб"];
const fmtFull=t=>{
  const s=Math.floor(t/1000);
  return String(Math.floor(s/3600)).padStart(2,"0")+":"+
         String(Math.floor(s%3600/60)).padStart(2,"0")+":"+
         String(s%60).padStart(2,"0");
};
function dayKey(){
  const d=new Date(Date.now()-5*3600000);
  return d.toISOString().slice(0,10);
}

/* MAIN TIMER */
let main={run:false,t:0,s:0};
const mainTimer=document.getElementById("mainTimer");
function tickMain(){
  const v=main.run?main.t+(Date.now()-main.s):main.t;
  mainTimer.querySelector(".time").textContent=fmtFull(v);
  updateAssignButtons();
  if(main.run)requestAnimationFrame(tickMain);
}
mainTimer.onclick=()=>{
  main.run=!main.run;
  mainTimer.classList.toggle("active",main.run);
  if(main.run){main.s=Date.now();tickMain()}
  else{main.t+=Date.now()-main.s}
};
tickMain();

/* ASSIGN MAIN */
function assignMain(p){
  if(main.t<=0)return;
  const key=`main_${p}_${dayKey()}`;
  localStorage[key]=(+localStorage[key]||0)+main.t;
  main.t=0;main.run=false;
  mainTimer.classList.remove("active");
  tickMain();
  updateToday();
}
function updateAssignButtons(){
  const a=main.t>0;
  assignCrypto.classList.toggle("disabled",!a);
  assignUapp.classList.toggle("disabled",!a);
}

/* TODAY */
function updateToday(){
  ["Crypto","UAPP"].forEach(p=>{
    let sum=0;
    Object.keys(localStorage)
      .filter(k=>k===`main_${p}_${dayKey()}`)
      .forEach(k=>sum+=+localStorage[k]);
    document.getElementById("today_"+p.toLowerCase()).textContent="Сьогодні "+fmtFull(sum);
  });
}
updateToday();

/* NAV */
let mode=null,currentProject=null;
function openSecondary(){
  home.classList.add("hidden");
  projectsView.classList.remove("hidden");
  bottomBar.classList.add("hidden");
  renderSecondary();
}
function goHome(){
  projectsView.classList.add("hidden");
  projectView.classList.add("hidden");
  home.classList.remove("hidden");
  bottomBar.classList.remove("hidden");
}
function backFromProject(){
  projectView.classList.add("hidden");
  mode==="secondary"?projectsView.classList.remove("hidden"):goHome();
}

/* SECONDARY */
function getSecondary(){
  return JSON.parse(localStorage.secondaryProjects||"[]");
}
function saveSecondary(l){
  localStorage.secondaryProjects=JSON.stringify(l);
}
function renderSecondary(){
  const l=getSecondary();
  secondaryList.innerHTML='<div class="card plus" onclick="addSecondary()">＋</div>';
  l.forEach(n=>{
    const d=document.createElement("div");
    d.className="card";
    d.textContent=n;
    d.onclick=()=>openSecondaryProject(n);
    secondaryList.appendChild(d);
  });
}
function addSecondary(){
  const n=prompt("Назва проєкту");
  if(!n)return;
  const l=getSecondary();
  l.unshift(n);
  saveSecondary(l);
  renderSecondary();
}

/* PROJECT OPEN */
function openMainProject(name){
  mode="main";
  currentProject=name;
  home.classList.add("hidden");
  projectView.classList.remove("hidden");
  bottomBar.classList.add("hidden");
  loadMainDays(name);
}
function openSecondaryProject(name){
  mode="secondary";
  currentProject=name;
  projectsView.classList.add("hidden");
  projectView.classList.remove("hidden");
  loadSecondaryDays(name);
}

/* PROJECT TIMER */
let proj={run:false,t:0,s:0};
const projectTimer=document.getElementById("projectTimer");
projectTimer.onclick=()=>{
  proj.run=!proj.run;
  projectTimer.classList.toggle("active",proj.run);
  if(proj.run){proj.s=Date.now();tickProject()}
  else{
    const d=Date.now()-proj.s;
    proj.t+=d;
    saveProject(d);
  }
};
function tickProject(){
  const v=proj.run?proj.t+(Date.now()-proj.s):proj.t;
  projectTimer.querySelector(".time").textContent=fmtFull(v);
  if(proj.run)requestAnimationFrame(tickProject);
}
function saveProject(delta){
  const key=(mode==="main"?"main_":"sec_")+currentProject+"_"+dayKey();
  localStorage[key]=(+localStorage[key]||0)+delta;
  mode==="main"?loadMainDays(currentProject):loadSecondaryDays(currentProject);
}

/* DAYS */
function loadMainDays(name){
  daysList.innerHTML="";
  Object.keys(localStorage)
    .filter(k=>k.startsWith(`main_${name}_`))
    .sort().reverse()
    .forEach(k=>renderDay(k));
}
function loadSecondaryDays(name){
  daysList.innerHTML="";
  Object.keys(localStorage)
    .filter(k=>k.startsWith(`sec_${name}_`))
    .sort().reverse()
    .forEach(k=>renderDay(k));
}
function renderDay(k){
  const date=k.split("_")[2];
  const d=new Date(date);
  const row=document.createElement("div");
  row.className="day";
  row.innerHTML=
    `<span>${date.slice(8,10)}.${date.slice(5,7)} ${daysUA[d.getDay()]}</span>
     <span>${fmtFull(+localStorage[k])}</span>`;
  row.onclick=()=>{
    document.querySelectorAll(".day").forEach(x=>x.classList.remove("active"));
    row.classList.add("active");
  };
  daysList.appendChild(row);
}

/* CSV */
function exportCSV(){
  let csv="";
  Object.keys(localStorage).forEach(k=>csv+=k+","+localStorage[k]+"\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv]));
  a.download="work-time.csv";
  a.click();
}
function importCSV(){fileInput.click()}
fileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>{
    r.result.split("\n").forEach(l=>{
      const [k,v]=l.split(",");
      if(k)localStorage[k]=v;
    });
    location.reload();
  };
  r.readAsText(e.target.files[0]);
};
</script>
</body>
</html>
