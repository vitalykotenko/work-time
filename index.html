<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Time</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000">

<style>
/* ---- СТИЛИ БЕЗ ИЗМЕНЕНИЙ ---- */
:root{
  --bg:#000;
  --glass:rgba(28,28,30,.72);
  --stroke:rgba(255,255,255,.18);
  --accent:#0A84FF;
  --radius:22px;
  --sub:#8E8E93;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,system-ui}
.hidden{display:none}
.btn,.card,.timer,.day,.adj{
  background:var(--glass);
  backdrop-filter:blur(26px);
  border-radius:var(--radius);
  border:1px solid var(--stroke);
}
.btn{padding:14px;text-align:center;color:var(--accent);font-size:16px}
.btn.disabled{opacity:.35;pointer-events:none}
.timer-wrap{display:flex;justify-content:center;margin:30px 0 10px}
.timer{width:260px;height:260px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:600}
.timer.active{background:rgba(10,132,255,.25);border-color:rgba(10,132,255,.55);box-shadow:0 0 40px rgba(10,132,255,.35)}
.adjust{display:flex;justify-content:center;gap:12px;margin-bottom:20px}
.adj{width:54px;height:54px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--accent);border-radius:50%}
.days{padding:14px;display:grid;gap:10px}
.day{display:flex;justify-content:space-between;padding:12px 14px}
.day.active{background:rgba(10,132,255,.18);border-color:rgba(10,132,255,.55)}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <div class="timer-wrap">
    <div id="mainTimer" class="timer">00:00:00</div>
  </div>
</div>

<!-- PROJECT -->
<div id="projectView" class="hidden">
  <div class="timer-wrap">
    <div id="projectTimer" class="timer">00:00:00</div>
  </div>
  <div class="adjust">
    <div class="adj" onclick="adjustProject(-600000)">-10</div>
    <div class="adj" onclick="adjustProject(-60000)">-1</div>
    <div class="adj" onclick="adjustProject(60000)">+1</div>
    <div class="adj" onclick="adjustProject(600000)">+10</div>
  </div>
  <div class="days" id="daysList"></div>
</div>

<script>
/* HELPERS */
const daysUA=["Нд","Пн","Вт","Ср","Чт","Пт","Сб"];
const fmt=t=>{
  const s=Math.floor(t/1000);
  return String(Math.floor(s/3600)).padStart(2,"0")+":"+
         String(Math.floor(s%3600/60)).padStart(2,"0")+":"+
         String(s%60).padStart(2,"0");
};
const dayKey=()=>new Date(Date.now()-5*3600000).toISOString().slice(0,10);

/* PROJECT TIMER */
let current="UAPP";
let projectStates=JSON.parse(localStorage.projectTimers||"{}");
const projEl=document.getElementById("projectTimer");

function openProject(p){
  current=p;
  home.classList.add("hidden");
  projectView.classList.remove("hidden");
  if(!projectStates[current])
    projectStates[current]={run:false,t:0,s:0};
  renderProject();
  loadDays(); // ← ВАЖНО
}

function renderProject(){
  const st=projectStates[current];
  const v=st.run?st.t+(Date.now()-st.s):st.t;
  projEl.textContent=fmt(v);
  projEl.classList.toggle("active",st.run);
  if(st.run)requestAnimationFrame(renderProject);
}

projEl.onclick=()=>{
  const st=projectStates[current];
  st.run=!st.run;
  if(st.run){
    st.s=Date.now();
    renderProject();
  }else{
    const delta=Date.now()-st.s;
    st.t+=delta;
    saveDay(delta);
    localStorage.projectTimers=JSON.stringify(projectStates);
    loadDays();
  }
};

function adjustProject(d){
  const st=projectStates[current];
  st.t=Math.max(0,st.t+d);
  saveDay(d);
  localStorage.projectTimers=JSON.stringify(projectStates);
  renderProject();
  loadDays();
}

function saveDay(delta){
  if(delta<=0) return;
  const k=`sec_${current}_${dayKey()}`;
  localStorage[k]=(+localStorage[k]||0)+delta;
}

/* DAYS */
function loadDays(){
  daysList.innerHTML="";
  Object.keys(localStorage)
    .filter(k=>k.startsWith(`sec_${current}_`))
    .sort().reverse()
    .forEach(k=>{
      const d=new Date(k.split("_")[2]);
      const row=document.createElement("div");
      row.className="day";
      row.innerHTML=
        `<span>${d.toLocaleDateString("uk-UA",{day:"2-digit",month:"2-digit"})} ${daysUA[d.getDay()]}</span>
         <span>${fmt(+localStorage[k])}</span>`;
      row.onclick=()=>{
        document.querySelectorAll(".day").forEach(x=>x.classList.remove("active"));
        row.classList.add("active");
      };
      daysList.appendChild(row);
    });
}
</script>
</body>
</html>
