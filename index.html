<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Time</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000">

<style>
:root{
  --bg:#000;
  --glass:rgba(28,28,30,.72);
  --glass-light:rgba(58,58,60,.55);
  --stroke:rgba(255,255,255,.18);
  --stroke-soft:rgba(255,255,255,.08);
  --accent:#0A84FF;
  --radius:22px;
  --sub:#8E8E93;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,system-ui;
}
.hidden{display:none}

/* COMMON */
.btn,.card,.timer,.day,.adjust{
  background:var(--glass);
  backdrop-filter:blur(26px);
  border-radius:var(--radius);
  border:1px solid var(--stroke);
  box-shadow:inset 0 0 0 1px var(--stroke-soft);
}
.btn{
  padding:14px;
  text-align:center;
  color:var(--accent);
  font-size:16px;
  white-space:nowrap;
}
.btn:active,.adjust:active{transform:scale(.95)}
.btn.disabled{opacity:.35;pointer-events:none}
.card{padding:18px}

/* DAYS */
.days{padding:14px;display:grid;gap:10px}
.day{
  display:flex;
  justify-content:space-between;
  padding:12px 14px;
  font-size:15px;
}
.day.active{
  background:rgba(10,132,255,.18);
  border-color:rgba(10,132,255,.55);
}
</style>
</head>

<body>

<div id="projectView">
  <div class="days" id="daysList"></div>
</div>

<script>
const daysUA=["Нд","Пн","Вт","Ср","Чт","Пт","Сб"];
const fmt=t=>{
  const s=Math.floor(t/1000);
  return String(Math.floor(s/3600)).padStart(2,"0")+":"+
         String(Math.floor(s%3600/60)).padStart(2,"0")+":"+
         String(s%60).padStart(2,"0");
};

/* DAYS — ИСПРАВЛЕНО */
function loadDays(){
  daysList.innerHTML="";
  Object.keys(localStorage)
    .filter(k=>k.startsWith("main_")||k.startsWith("sec_"))
    .sort().reverse()
    .forEach(k=>{
      const d=k.split("_")[2];
      const D=new Date(d);
      const row=document.createElement("div");
      row.className="day";
      row.innerHTML=`
        <span>${d.slice(8,10)}.${d.slice(5,7)} ${daysUA[D.getDay()]}</span>
        <span>${fmt(+localStorage[k])}</span>
      `;
      row.onclick=()=>{
        document.querySelectorAll(".day").forEach(x=>x.classList.remove("active"));
        row.classList.add("active");
      };
      daysList.appendChild(row);
    });
}

loadDays();
</script>

</body>
</html>
