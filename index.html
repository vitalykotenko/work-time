<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Time</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<style>
:root {
  --bg:#000;
  --card:#1c1c1e;
  --stroke:rgba(255,255,255,.18);
  --accent:#0A84FF;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,system-ui;
}

/* buttons */
.btn{
  padding:14px;
  border-radius:18px;
  background:var(--card);
  border:1px solid var(--stroke);
  color:var(--accent);
  text-align:center;
  font-size:16px;
  white-space:nowrap;
}
.btn:active{transform:scale(.97)}

/* top */
.top{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:14px;
}

/* projects */
.projects{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  padding:6px 14px 0;
}
.project{
  padding:22px 0;
  text-align:center;
  border-radius:22px;
  background:var(--card);
  border:1px solid var(--stroke);
  font-size:18px;
}

/* assign */
.assign{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:14px;
}

/* timer */
.timer-wrap{
  display:flex;
  justify-content:center;
  margin-top:20px;
}
.timer{
  width:260px;
  height:260px;
  border-radius:50%;
  border:1.5px solid var(--stroke);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}
.timer.active{
  border-color:var(--accent);
}

input[type=file]{display:none}
</style>
</head>

<body>

<div class="top">
  <div class="btn" id="exportCSV">Експорт CSV</div>
  <div class="btn" id="importCSV">Імпорт CSV</div>
  <input type="file" id="fileInput" accept=".csv">
</div>

<div class="projects">
  <div class="project">Crypto</div>
  <div class="project">UAPP</div>
</div>

<div class="assign">
  <div class="btn">Зачислити в Crypto</div>
  <div class="btn">Зачислити в UAPP</div>
</div>

<div class="timer-wrap">
  <div id="timer" class="timer">00:00:00</div>
</div>

<script>
/* ===== TIMER STATE ===== */
const STORAGE = "main_timer_state";

let state = JSON.parse(localStorage.getItem(STORAGE)) || {
  running:false,
  elapsed:0,
  startedAt:0
};

let raf;
const timer = document.getElementById("timer");

/* ===== FORMAT ===== */
function fmt(ms){
  const s=Math.floor(ms/1000);
  return [
    String(Math.floor(s/3600)).padStart(2,"0"),
    String(Math.floor(s%3600/60)).padStart(2,"0"),
    String(s%60).padStart(2,"0")
  ].join(":");
}

/* ===== SAVE ===== */
function save(){
  localStorage.setItem(STORAGE,JSON.stringify(state));
}

/* ===== RENDER ===== */
function render(){
  const now = state.running
    ? state.elapsed + (Date.now()-state.startedAt)
    : state.elapsed;

  timer.textContent = fmt(now);
  if(state.running) raf=requestAnimationFrame(render);
}

/* ===== TOGGLE ===== */
timer.onclick = () => {
  state.running=!state.running;
  timer.classList.toggle("active",state.running);

  if(state.running){
    state.startedAt=Date.now();
    render();
  }else{
    state.elapsed+=Date.now()-state.startedAt;
    state.startedAt=0;
    cancelAnimationFrame(raf);
  }
  save();
};

/* ===== INIT ===== */
timer.classList.toggle("active",state.running);
render();

/* ===== CSV ===== */
exportCSV.onclick=()=>{
  let csv="elapsed_ms\n"+state.elapsed;
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download="work-time.csv";
  a.click();
};

importCSV.onclick=()=>fileInput.click();
fileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>{
    const v=Number(r.result.split("\n")[1]);
    if(!isNaN(v)){
      state.elapsed=v;
      state.running=false;
      state.startedAt=0;
      save();
      render();
    }
  };
  r.readAsText(e.target.files[0]);
};
</script>

</body>
</html>
