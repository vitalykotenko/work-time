<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Time</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<style>
:root{
  --bg:#000;
  --glass:rgba(28,28,30,.72);
  --stroke:rgba(255,255,255,.18);
  --stroke-soft:rgba(255,255,255,.08);
  --accent:#0A84FF;
  --radius:22px;
  --sub:#8E8E93;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,system-ui;
}

.hidden{display:none}

/* COMMON */
.btn,.card,.timer,.adjust,.day{
  background:var(--glass);
  backdrop-filter:blur(26px);
  border-radius:var(--radius);
  border:1px solid var(--stroke);
  box-shadow:inset 0 0 0 1px var(--stroke-soft);
}

.btn{
  padding:14px;
  text-align:center;
  color:var(--accent);
  font-size:16px;
  white-space:nowrap;
}
.btn:active{transform:scale(.97)}
.btn.disabled{opacity:.35;pointer-events:none}

.card{padding:18px}

/* TOP */
.top{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:14px;
}

/* PROJECTS */
.projects{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  padding:6px 14px;
}
.project .name{font-size:18px}
.project .today{
  margin-top:6px;
  font-size:13px;
  color:var(--sub);
}

/* ASSIGN */
.assign{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:14px;
}

/* TIMER */
.timer-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin:30px 0 110px; /* РЕЗЕРВ ПОД КНОПКУ ПРОЄКТИ */
}

.timer{
  width:260px;
  height:260px;
  border-radius:50%;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  font-weight:600;
}

.timer.active{
  background:rgba(10,132,255,.22);
  border-color:rgba(10,132,255,.55);
  box-shadow:
    inset 0 0 0 1px rgba(10,132,255,.35),
    0 0 40px rgba(10,132,255,.25);
}

.timer .time{z-index:2}

/* WAVE */
.wave{
  position:absolute;
  left:-50%;
  bottom:-40%;
  width:200%;
  height:200%;
  background:
    linear-gradient(
      90deg,
      rgba(10,132,255,.35),
      rgba(10,132,255,.15),
      rgba(10,132,255,.35)
    );
  border-radius:45%;
  opacity:0;
}
.timer.active .wave{
  opacity:1;
  animation:wave 8s linear infinite;
}
@keyframes wave{
  from{transform:translateX(-25%) rotate(0deg)}
  to{transform:translateX(25%) rotate(360deg)}
}

/* ADJUST */
.adjustments{
  display:flex;
  gap:12px;
  margin-top:16px;
}
.adjust{
  width:56px;
  height:56px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  color:var(--accent);
}
.adjust:active{transform:scale(.95)}

/* PROJECT VIEW */
.header{padding:14px}
.days{
  padding:0 14px 20px;
  display:grid;
  gap:10px;
}
.day{
  display:flex;
  justify-content:space-between;
  padding:12px 14px;
  font-size:15px;
}
.day.active{
  background:rgba(10,132,255,.18);
  border-color:rgba(10,132,255,.55);
}

/* BOTTOM */
.bottom{
  position:fixed;
  left:0;right:0;bottom:0;
  padding:14px;
  padding-bottom:calc(14px + env(safe-area-inset-bottom));
  background:linear-gradient(to top,rgba(0,0,0,.9),rgba(0,0,0,.4));
}

input[type=file]{display:none}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <div class="top">
    <div class="btn" onclick="exportCSV()">Експорт CSV</div>
    <div class="btn" onclick="importCSV()">Імпорт CSV</div>
    <input type="file" id="fileInput">
  </div>

  <div class="projects">
    <div class="card project">
      <div class="name">Crypto</div>
      <div class="today" id="today_crypto">Сьогодні 00:00</div>
    </div>
    <div class="card project">
      <div class="name">UAPP</div>
      <div class="today" id="today_uapp">Сьогодні 00:00</div>
    </div>
  </div>

  <div class="assign">
    <div class="btn" id="assignCrypto" onclick="assign('Crypto')">Зачислити в Crypto</div>
    <div class="btn" id="assignUapp" onclick="assign('UAPP')">Зачислити в UAPP</div>
  </div>

  <div class="timer-wrap">
    <div id="mainTimer" class="timer">
      <div class="wave"></div>
      <span class="time">00:00:00</span>
    </div>

    <div class="adjustments">
      <div class="adjust" onclick="adjust(-600000)">−10</div>
      <div class="adjust" onclick="adjust(-60000)">−1</div>
      <div class="adjust" onclick="adjust(60000)">+1</div>
      <div class="adjust" onclick="adjust(600000)">+10</div>
    </div>
  </div>
</div>

<!-- PROJECT -->
<div id="projectView" class="hidden">
  <div class="header">
    <div class="btn" onclick="goHome()">← Назад</div>
  </div>

  <div class="timer-wrap">
    <div id="projectTimer" class="timer">
      <div class="wave"></div>
      <span class="time">00:00:00</span>
    </div>
  </div>

  <div class="days" id="daysList"></div>
</div>

<div class="bottom">
  <div class="btn" onclick="openProject('Crypto')">Проєкти</div>
</div>

<script>
const daysUA=["Нд","Пн","Вт","Ср","Чт","Пт","Сб"];
const fmtFull=t=>{
  const s=Math.floor(t/1000);
  return String(Math.floor(s/3600)).padStart(2,"0")+":"+
         String(Math.floor(s%3600/60)).padStart(2,"0")+":"+
         String(s%60).padStart(2,"0");
};

let main={run:false,t:0,s:0};
const mainTimer=document.getElementById("mainTimer");

function render(){
  const v=main.run?main.t+(Date.now()-main.s):main.t;
  mainTimer.querySelector(".time").textContent=fmtFull(v);
  if(main.run)requestAnimationFrame(render);
}
mainTimer.onclick=()=>{
  main.run=!main.run;
  mainTimer.classList.toggle("active",main.run);
  if(main.run){main.s=Date.now();render()}
  else main.t+=Date.now()-main.s;
};

function adjust(ms){
  main.t=Math.max(0,main.t+ms);
  render();
}

function assign(p){
  if(main.t===0)return;
  const d=new Date();
  const key=`${p}_${d.toISOString().slice(0,10)}`;
  localStorage[key]=(Number(localStorage[key])||0)+main.t;
  document.getElementById("today_"+p.toLowerCase()).textContent=
    "Сьогодні "+fmtFull(localStorage[key]);
  main.t=0;main.run=false;
  mainTimer.classList.remove("active");
  render();
}

function openProject(p){
  home.classList.add("hidden");
  projectView.classList.remove("hidden");
  renderDays(p);
}
function goHome(){
  projectView.classList.add("hidden");
  home.classList.remove("hidden");
}

function renderDays(p){
  daysList.innerHTML="";
  Object.keys(localStorage)
    .filter(k=>k.startsWith(p+"_"))
    .sort().reverse()
    .forEach(k=>{
      const d=new Date(k.split("_")[1]);
      const row=document.createElement("div");
      row.className="day";
      row.innerHTML=
        `<span>${d.getDate().toString().padStart(2,"0")}.${(d.getMonth()+1)
          .toString().padStart(2,"0")} ${daysUA[d.getDay()]}</span>
         <span>${fmtFull(+localStorage[k])}</span>`;
      row.onclick=()=>{
        document.querySelectorAll(".day").forEach(r=>r.classList.remove("active"));
        row.classList.add("active");
      };
      daysList.appendChild(row);
    });
}

function exportCSV(){
  let csv="";
  Object.keys(localStorage).forEach(k=>csv+=k+","+localStorage[k]+"\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv]));
  a.download="work-time.csv";
  a.click();
}
function importCSV(){fileInput.click()}
fileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>{
    r.result.split("\n").forEach(l=>{
      const [k,v]=l.split(",");
      if(k)localStorage[k]=v;
    });
    location.reload();
  };
  r.readAsText(e.target.files[0]);
};

render();
</script>

</body>
</html>
