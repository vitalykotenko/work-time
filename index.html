<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Time</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, system-ui;
  text-align: center;
}

.header {
  padding: 16px;
  border-bottom: 1px solid #1c1c1e;
}

.buttons {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn {
  padding: 10px 16px;
  border-radius: 14px;
  background: #1c1c1e;
  color: #0a84ff;
  font-size: 15px;
}

.btn:active { background: #2c2c2e; }

.circle {
  width: 240px;
  height: 240px;
  border-radius: 50%;
  margin: 60px auto;
  background: #1c1c1e;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
}

.circle.active { background: #1c2a3a; }

input[type="file"] { display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="buttons">
    <div class="btn" id="toCrypto">Зачислити в Crypto</div>
    <div class="btn" id="toUapp">Зачислити в UAPP</div>
  </div>
  <br>
  <div class="buttons">
    <div class="btn" id="exportCsv">Експорт CSV</div>
    <div class="btn" id="importCsv">Імпорт CSV</div>
    <input type="file" id="fileInput" accept=".csv">
  </div>
</div>

<div id="circle" class="circle">
  <span id="time">00:00:00</span>
</div>

<script>
/* ===== STATE ===== */
let running = false;
let startTs = null;
let accumulated = 0;

/* ===== STORAGE KEYS ===== */
const KEY_STATE = "timer_state";
const KEY_PROJECTS = "projects";

/* ===== ELEMENTS ===== */
const circle = document.getElementById("circle");
const timeEl = document.getElementById("time");

/* ===== TIME UTILS ===== */
function format(ms) {
  const s = Math.floor(ms / 1000);
  const h = String(Math.floor(s / 3600)).padStart(2,"0");
  const m = String(Math.floor((s % 3600) / 60)).padStart(2,"0");
  const sec = String(s % 60).padStart(2,"0");
  return `${h}:${m}:${sec}`;
}

/* ===== DAY KEY (05:00) ===== */
function dayKey(ts = Date.now()) {
  const d = new Date(ts - 5 * 3600 * 1000);
  return d.toISOString().slice(0,10);
}

/* ===== LOAD ===== */
(function load() {
  const s = JSON.parse(localStorage.getItem(KEY_STATE));
  if (!s) return;

  accumulated = s.accumulated || 0;
  running = s.running;
  startTs = s.startTs;

  if (running && startTs) {
    accumulated += Date.now() - startTs;
    startTs = Date.now();
  }
})();

/* ===== SAVE ===== */
function save() {
  localStorage.setItem(KEY_STATE, JSON.stringify({
    accumulated,
    running,
    startTs
  }));
}

/* ===== RENDER ===== */
function render() {
  timeEl.textContent = format(accumulated + (running ? Date.now() - startTs : 0));
  circle.classList.toggle("active", running);
}

/* ===== TOGGLE ===== */
circle.onclick = () => {
  if (running) {
    accumulated += Date.now() - startTs;
    running = false;
    startTs = null;
  } else {
    running = true;
    startTs = Date.now();
  }
  save();
  render();
};

/* ===== LOOP ===== */
setInterval(render, 500);

/* ===== PROJECTS ===== */
function addToProject(name) {
  if (running) {
    accumulated += Date.now() - startTs;
    running = false;
    startTs = null;
  }

  const key = `${name}_${dayKey()}`;
  const prev = Number(localStorage.getItem(key) || 0);
  localStorage.setItem(key, prev + accumulated);

  accumulated = 0;
  save();
  render();
}

document.getElementById("toCrypto").onclick = () => addToProject("crypto");
document.getElementById("toUapp").onclick = () => addToProject("uapp");

/* ===== CSV ===== */
document.getElementById("exportCsv").onclick = () => {
  let csv = "key,ms\n";
  Object.keys(localStorage).forEach(k => {
    if (k.includes("_")) csv += `${k},${localStorage.getItem(k)}\n`;
  });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], {type:"text/csv"}));
  a.download = "work-time.csv";
  a.click();
};

document.getElementById("importCsv").onclick = () =>
  document.getElementById("fileInput").click();

document.getElementById("fileInput").onchange = e => {
  const r = new FileReader();
  r.onload = () => {
    r.result.split("\n").slice(1).forEach(l => {
      if (!l.trim()) return;
      const [k,v] = l.split(",");
      localStorage.setItem(k, v);
    });
    alert("Імпорт завершено");
  };
  r.readAsText(e.target.files[0]);
};

/* ===== INIT ===== */
render();
</script>
</body>
</html>
