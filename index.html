<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Time</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<style>
:root {
  --bg: #000;
  --card: rgba(28,28,30,0.78);
  --accent: #0A84FF;
  --accent-soft: rgba(10,132,255,0.25);
  --text: #fff;
  --radius: 18px;

  --ios-stroke: rgba(255,255,255,0.18);
  --ios-stroke-soft: rgba(255,255,255,0.08);
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, system-ui;
}

/* ===== iOS 26 CARD STROKE ===== */
.ios-card {
  position: relative;
  overflow: hidden;
}

.ios-card::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  border: 1px solid var(--ios-stroke-soft);
  box-shadow:
    inset 0 0 0 0.5px var(--ios-stroke),
    0 0 0.5px rgba(255,255,255,0.12);
}

/* ===== TOP BAR ===== */
.top {
  padding: 14px 16px;
  display: flex;
  gap: 10px;
  backdrop-filter: blur(20px);
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.85),
    rgba(0,0,0,0.55)
  );
  border-bottom: 0.5px solid rgba(255,255,255,0.08);
}

.btn {
  flex: 1;
  text-align: center;
  padding: 12px 0;
  border-radius: 14px;
  background: var(--card);
  color: var(--accent);
  font-size: 15px;
  font-weight: 500;
  transition: transform 0.12s ease, background 0.15s ease;
}

.btn:active {
  transform: scale(0.97);
  background: rgba(44,44,46,0.9);
}

/* ===== PROJECTS ===== */
.projects {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  padding: 18px 16px 10px;
}

.project {
  background: var(--card);
  backdrop-filter: blur(20px);
  border-radius: var(--radius);
  padding: 22px 0;
  text-align: center;
  font-size: 18px;
  font-weight: 600;
  transition: transform 0.15s ease, background 0.15s ease;
}

.project:active {
  transform: scale(0.96);
  background: rgba(44,44,46,0.9);
}

/* ===== ASSIGN ===== */
.assign {
  display: flex;
  gap: 12px;
  padding: 6px 16px 14px;
}

/* ===== TIMER ===== */
.timer-wrap {
  display: flex;
  justify-content: center;
  margin: 36px 0 60px;
}

.timer {
  width: 260px;
  height: 260px;
  border-radius: 50%;
  background: var(--card);
  backdrop-filter: blur(30px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  font-weight: 600;
  letter-spacing: 1px;
  transition: transform 0.15s ease, background 0.25s ease;
}

.timer.active {
  background: var(--accent-soft);
}

.timer.active::after {
  border-color: rgba(10,132,255,0.55);
  box-shadow:
    inset 0 0 0 1px rgba(10,132,255,0.45),
    0 0 18px rgba(10,132,255,0.35);
}

.timer:active {
  transform: scale(0.96);
}

input[type="file"] { display: none; }
</style>
</head>
<body>

<!-- TOP -->
<div class="top">
  <div class="btn ios-card" id="exportCSV">Експорт CSV</div>
  <div class="btn ios-card" id="importCSV">Імпорт CSV</div>
  <input type="file" id="fileInput" accept=".csv">
</div>

<!-- PROJECTS -->
<div class="projects">
  <div class="project ios-card" onclick="openProject('crypto')">Crypto</div>
  <div class="project ios-card" onclick="openProject('uapp')">UAPP</div>
</div>

<!-- ASSIGN -->
<div class="assign">
  <div class="btn ios-card" onclick="assignTime('crypto')">Зачислити в Crypto</div>
  <div class="btn ios-card" onclick="assignTime('uapp')">Зачислити в UAPP</div>
</div>

<!-- TIMER -->
<div class="timer-wrap">
  <div id="timer" class="timer ios-card">00:00:00</div>
</div>

<script>
let running = false;
let startAt = 0;
let elapsed = Number(localStorage.getItem("elapsed")) || 0;
let raf;

const timer = document.getElementById("timer");

function fmt(ms) {
  const s = Math.floor(ms / 1000);
  const h = String(Math.floor(s / 3600)).padStart(2,"0");
  const m = String(Math.floor((s % 3600) / 60)).padStart(2,"0");
  const sec = String(s % 60).padStart(2,"0");
  return `${h}:${m}:${sec}`;
}

function render() {
  const now = running ? elapsed + (Date.now() - startAt) : elapsed;
  timer.textContent = fmt(now);
  if (running) raf = requestAnimationFrame(render);
}

timer.onclick = () => {
  running = !running;
  timer.classList.toggle("active", running);

  if (running) {
    startAt = Date.now();
    render();
  } else {
    elapsed += Date.now() - startAt;
    localStorage.setItem("elapsed", elapsed);
    cancelAnimationFrame(raf);
  }
};

function assignTime(project) {
  const key = `${project}_${new Date().toISOString().slice(0,10)}`;
  const prev = Number(localStorage.getItem(key)) || 0;
  localStorage.setItem(key, prev + elapsed);

  elapsed = 0;
  localStorage.setItem("elapsed", 0);
  running = false;
  timer.classList.remove("active");
  timer.textContent = "00:00:00";
}

function openProject(name) {
  alert(`Проєкт ${name.toUpperCase()} — аналітика буде далі`);
}

document.getElementById("exportCSV").onclick = () => {
  let csv = "project,date,ms\n";
  Object.keys(localStorage)
    .filter(k => k.includes("_"))
    .forEach(k => {
      const [p,d] = k.split("_");
      csv += `${p},${d},${localStorage.getItem(k)}\n`;
    });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], {type:"text/csv"}));
  a.download = "work-time.csv";
  a.click();
};

document.getElementById("importCSV").onclick = () =>
  document.getElementById("fileInput").click();

fileInput.onchange = e => {
  const r = new FileReader();
  r.onload = () => {
    r.result.split("\n").slice(1).forEach(l => {
      if (!l) return;
      const [p,d,v] = l.split(",");
      localStorage.setItem(`${p}_${d}`, v);
    });
    alert("Імпортовано");
  };
  r.readAsText(e.target.files[0]);
};

timer.textContent = fmt(elapsed);
</script>
</body>
</html>
