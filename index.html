<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Time</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<style>
:root{
  --bg:#000;
  --glass:rgba(28,28,30,.72);
  --stroke:rgba(255,255,255,.18);
  --stroke-soft:rgba(255,255,255,.08);
  --accent:#0A84FF;
  --radius:22px;
  --sub:#8E8E93;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,system-ui;
}

.hidden{display:none}

/* ===== COMMON ===== */
.btn,.card,.timer{
  background:var(--glass);
  backdrop-filter:blur(26px);
  border-radius:var(--radius);
  border:1px solid var(--stroke);
  box-shadow:inset 0 0 0 1px var(--stroke-soft);
}

.btn{
  padding:14px;
  text-align:center;
  color:var(--accent);
  font-size:16px;
  white-space:nowrap;
}
.btn:active{transform:scale(.97)}

.card{
  padding:18px;
}

/* ===== TOP ===== */
.top{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:14px;
}

/* ===== PROJECTS (HOME) ===== */
.projects{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  padding:6px 14px;
}
.project{
  text-align:center;
}
.project .name{
  font-size:18px;
}
.project .today{
  margin-top:6px;
  font-size:13px;
  color:var(--sub);
}

/* ===== ASSIGN ===== */
.assign{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:14px;
}

/* ===== TIMER ===== */
.timer-wrap{
  display:flex;
  justify-content:center;
  margin:30px 0 90px;
}
.timer{
  width:260px;
  height:260px;
  border-radius:50%;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  font-weight:600;
  transition:.25s;
}
.timer.active{
  background:rgba(10,132,255,.22);
  border-color:rgba(10,132,255,.55);
  box-shadow:
    inset 0 0 0 1px rgba(10,132,255,.35),
    0 0 40px rgba(10,132,255,.25);
}
.timer .time{z-index:2}

/* wave */
.wave{
  position:absolute;
  left:-50%;
  bottom:-40%;
  width:200%;
  height:200%;
  background:rgba(255,255,255,.08);
  border-radius:45%;
  opacity:0;
}
.timer.active .wave{
  opacity:1;
  animation:wave 6s linear infinite;
}
@keyframes wave{
  from{transform:translateX(0) rotate(0)}
  to{transform:translateX(50%) rotate(360deg)}
}

/* ===== BOTTOM ===== */
.bottom{
  position:fixed;
  left:0;right:0;bottom:0;
  padding:14px;
  background:linear-gradient(to top,rgba(0,0,0,.9),rgba(0,0,0,.4));
}

/* ===== PROJECT LIST ===== */
.list{
  padding:14px;
  display:grid;
  gap:14px;
}
.plus{
  font-size:26px;
  text-align:center;
  color:#aaa;
}

/* ===== HEADER ===== */
.header{padding:14px}

input[type=file]{display:none}
</style>
</head>

<body>

<!-- ================= HOME ================= -->
<div id="home">

  <div class="top">
    <div class="btn" onclick="exportCSV()">Експорт CSV</div>
    <div class="btn" onclick="importCSV()">Імпорт CSV</div>
    <input type="file" id="fileInput">
  </div>

  <div class="projects">
    <div class="card project">
      <div class="name">Crypto</div>
      <div class="today" id="today_crypto">Сьогодні 00:00</div>
    </div>
    <div class="card project">
      <div class="name">UAPP</div>
      <div class="today" id="today_uapp">Сьогодні 00:00</div>
    </div>
  </div>

  <div class="assign">
    <div class="btn" onclick="assign('crypto')">Зачислити в Crypto</div>
    <div class="btn" onclick="assign('uapp')">Зачислити в UAPP</div>
  </div>

  <div class="timer-wrap">
    <div id="mainTimer" class="timer">
      <div class="wave"></div>
      <span class="time">00:00:00</span>
    </div>
  </div>
</div>

<!-- ================= PROJECTS ================= -->
<div id="projectsView" class="hidden">
  <div class="header">
    <div class="btn" onclick="goHome()">← Назад</div>
  </div>
  <div class="list" id="projectsList">
    <div class="card plus" onclick="addProject()">＋</div>
  </div>
</div>

<!-- ================= PROJECT ================= -->
<div id="projectView" class="hidden">
  <div class="header">
    <div class="btn" onclick="backToProjects()">← Назад</div>
  </div>
  <div class="timer-wrap">
    <div id="projectTimer" class="timer">
      <div class="wave"></div>
      <span class="time">00:00:00</span>
    </div>
  </div>
</div>

<div id="bottomBar" class="bottom">
  <div class="btn" onclick="openProjects()">Проєкти</div>
</div>

<script>
/* ===== HELPERS ===== */
function fmt(ms){
  const s=Math.floor(ms/1000);
  return [
    String(Math.floor(s/3600)).padStart(2,"0"),
    String(Math.floor(s%3600/60)).padStart(2,"0"),
    String(s%60).padStart(2,"0")
  ].join(":");
}
function todayKey(){
  const d=new Date();
  d.setHours(d.getHours()-5);
  return d.toISOString().slice(0,10);
}

/* ===== MAIN TIMER ===== */
const KEY="main_timer";
let state=JSON.parse(localStorage.getItem(KEY))||{running:false,elapsed:0,startedAt:0};
let raf;
const mainTimer=document.getElementById("mainTimer");

function saveMain(){localStorage.setItem(KEY,JSON.stringify(state))}
function renderMain(){
  const now=state.running
    ? state.elapsed+(Date.now()-state.startedAt)
    : state.elapsed;
  mainTimer.querySelector(".time").textContent=fmt(now);
  if(state.running)raf=requestAnimationFrame(renderMain);
}
mainTimer.onclick=()=>{
  state.running=!state.running;
  mainTimer.classList.toggle("active",state.running);
  if(state.running){
    state.startedAt=Date.now();renderMain();
  }else{
    state.elapsed+=Date.now()-state.startedAt;
    state.startedAt=0;cancelAnimationFrame(raf);
  }
  saveMain();
};
mainTimer.classList.toggle("active",state.running);
renderMain();

/* ===== ASSIGN ===== */
function assign(project){
  if(state.elapsed===0)return;
  const key=`log_${project}_${todayKey()}`;
  const prev=Number(localStorage.getItem(key)||0);
  localStorage.setItem(key,prev+state.elapsed);
  state.elapsed=0;
  state.running=false;
  state.startedAt=0;
  saveMain();
  mainTimer.classList.remove("active");
  renderMain();
  updateToday();
}

/* ===== TODAY TOTAL ===== */
function sumToday(project){
  return Number(localStorage.getItem(`log_${project}_${todayKey()}`)||0);
}
function updateToday(){
  document.getElementById("today_crypto").textContent=
    "Сьогодні "+fmt(sumToday("crypto"));
  document.getElementById("today_uapp").textContent=
    "Сьогодні "+fmt(sumToday("uapp"));
}
updateToday();

/* ===== NAV ===== */
function openProjects(){
  home.classList.add("hidden");
  projectsView.classList.remove("hidden");
  bottomBar.classList.add("hidden");
}
function goHome(){
  projectsView.classList.add("hidden");
  projectView.classList.add("hidden");
  home.classList.remove("hidden");
  bottomBar.classList.remove("hidden");
}
function backToProjects(){
  projectView.classList.add("hidden");
  projectsView.classList.remove("hidden");
}

/* ===== PROJECTS (CUSTOM) ===== */
let projects=JSON.parse(localStorage.getItem("projects")||"[]");
const list=document.getElementById("projectsList");

function renderProjects(){
  list.innerHTML='<div class="card plus" onclick="addProject()">＋</div>';
  projects.forEach(p=>{
    const d=document.createElement("div");
    d.className="card";
    d.textContent=p;
    d.onclick=()=>openProject(p);
    list.appendChild(d);
  });
}
function addProject(){
  const name=prompt("Назва проєкту");
  if(!name)return;
  projects.unshift(name);
  localStorage.setItem("projects",JSON.stringify(projects));
  renderProjects();
}
renderProjects();

/* ===== PROJECT TIMER ===== */
let projState,projRaf,currentProject;
const projectTimer=document.getElementById("projectTimer");

function openProject(name){
  currentProject=name;
  projectsView.classList.add("hidden");
  projectView.classList.remove("hidden");
  const key="proj_"+name;
  projState=JSON.parse(localStorage.getItem(key))||{running:false,elapsed:0,startedAt:0};
  projectTimer.classList.toggle("active",projState.running);
  renderProject();
}
function renderProject(){
  const now=projState.running
    ? projState.elapsed+(Date.now()-projState.startedAt)
    : projState.elapsed;
  projectTimer.querySelector(".time").textContent=fmt(now);
  if(projState.running)projRaf=requestAnimationFrame(renderProject);
}
projectTimer.onclick=()=>{
  projState.running=!projState.running;
  projectTimer.classList.toggle("active",projState.running);
  if(projState.running){
    projState.startedAt=Date.now();renderProject();
  }else{
    projState.elapsed+=Date.now()-projState.startedAt;
    projState.startedAt=0;cancelAnimationFrame(projRaf);
  }
  localStorage.setItem("proj_"+currentProject,JSON.stringify(projState));
};

/* ===== CSV ===== */
function exportCSV(){
  let csv="key,value\n";
  Object.keys(localStorage).forEach(k=>csv+=`${k},${localStorage[k]}\n`);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download="work-time.csv";
  a.click();
}
function importCSV(){fileInput.click()}
fileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>{
    r.result.split("\n").slice(1).forEach(l=>{
      if(!l)return;
      const [k,v]=l.split(",");
      localStorage.setItem(k,v);
    });
    updateToday();
    alert("Імпортовано");
  };
  r.readAsText(e.target.files[0]);
};
</script>

</body>
</html>
