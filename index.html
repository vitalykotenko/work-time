<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Work Time</title>

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#000000" />

<style>
:root{
  --bg:#000;
  --card:#1c1c1e;
  --stroke:rgba(255,255,255,.18);
  --accent:#0a84ff;
  --radius:18px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:-apple-system,system-ui;
  overflow:hidden;
}
.view{
  position:absolute;
  inset:0;
  padding:16px;
  transition:transform .35s ease;
}
.hidden{display:none}
.card{
  background:var(--card);
  border-radius:var(--radius);
  border:1px solid var(--stroke);
}
.btn{
  padding:14px;
  text-align:center;
  border-radius:14px;
  border:1px solid var(--stroke);
  background:var(--card);
  color:var(--accent);
}
.btn:active{transform:scale(.96)}
.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
.timer{
  width:260px;
  height:260px;
  margin:40px auto;
  border-radius:50%;
  border:1px solid var(--stroke);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}
.timer.active{
  background:#102840;
}
.header{
  display:flex;
  gap:10px;
  margin-bottom:16px;
}
.project{
  padding:22px 0;
  text-align:center;
  font-size:18px;
}
.plus{
  background:#2c2c2e;
  color:#aaa;
}
.back{
  margin-bottom:16px;
}
</style>
</head>
<body>

<!-- MAIN -->
<div id="main" class="view">
  <div class="header">
    <div class="btn">Експорт CSV</div>
    <div class="btn">Імпорт CSV</div>
  </div>

  <div class="grid2">
    <div class="card project">Crypto</div>
    <div class="card project">UAPP</div>
  </div>

  <div class="grid2" style="margin-top:14px">
    <div class="btn">Зачислити в Crypto</div>
    <div class="btn">Зачислити в UAPP</div>
  </div>

  <div id="mainTimer" class="timer">00:00:00</div>
</div>

<!-- TEMP PROJECTS -->
<div id="temps" class="view" style="transform:translateX(100%)">
  <div class="grid2">
    <div class="card project plus" onclick="createProject()">＋</div>
  </div>
  <div id="tempList" class="grid2" style="margin-top:14px"></div>
</div>

<!-- PROJECT VIEW -->
<div id="projectView" class="view hidden">
  <div class="btn back" onclick="backToTemps()">← Назад</div>
  <div id="projectTitle" class="project card"></div>
  <div id="projectTimer" class="timer">00:00:00</div>
</div>

<script>
let startX=0;
document.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
document.addEventListener("touchend",e=>{
  let dx=e.changedTouches[0].clientX-startX;
  if(dx<-80) openTemps();
  if(dx>80) openMain();
});

const main=document.getElementById("main");
const temps=document.getElementById("temps");
const projectView=document.getElementById("projectView");

function openTemps(){
  main.style.transform="translateX(-100%)";
  temps.style.transform="translateX(0)";
}
function openMain(){
  main.style.transform="translateX(0)";
  temps.style.transform="translateX(100%)";
}

let projects=JSON.parse(localStorage.getItem("projects_temp")||"[]");
let current=null, raf;

function save(){localStorage.setItem("projects_temp",JSON.stringify(projects))}

function createProject(){
  const name=prompt("Назва проєкту");
  if(!name)return;
  projects.unshift({
    id:Date.now(),
    name,
    elapsed:0,
    running:false,
    startAt:0
  });
  save(); renderTemps();
}

function renderTemps(){
  const list=document.getElementById("tempList");
  list.innerHTML="";
  projects.forEach(p=>{
    const d=document.createElement("div");
    d.className="card project";
    d.textContent=p.name;
    d.onclick=()=>openProject(p.id);
    list.appendChild(d);
  });
}
renderTemps();

function openProject(id){
  current=projects.find(p=>p.id===id);
  projectView.classList.remove("hidden");
  document.getElementById("projectTitle").textContent=current.name;
  renderProjectTimer();
}

function backToTemps(){
  stopProject();
  projectView.classList.add("hidden");
  save();
}

function fmt(ms){
  const s=Math.floor(ms/1000);
  return [
    String(Math.floor(s/3600)).padStart(2,"0"),
    String(Math.floor((s%3600)/60)).padStart(2,"0"),
    String(s%60).padStart(2,"0")
  ].join(":");
}

const pt=document.getElementById("projectTimer");
pt.onclick=()=>{
  current.running=!current.running;
  pt.classList.toggle("active",current.running);
  if(current.running){
    current.startAt=Date.now();
    loop();
  }else stopProject();
};

function stopProject(){
  if(current?.running){
    current.elapsed+=Date.now()-current.startAt;
    current.running=false;
    cancelAnimationFrame(raf);
  }
}

function loop(){
  pt.textContent=fmt(
    current.elapsed+(Date.now()-current.startAt)
  );
  if(current.running) raf=requestAnimationFrame(loop);
}

function renderProjectTimer(){
  pt.textContent=fmt(current.elapsed);
  pt.classList.toggle("active",current.running);
}
</script>
</body>
</html>
