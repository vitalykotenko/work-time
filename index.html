<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Time</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<style>
:root{
  --bg:#000;
  --glass:rgba(28,28,30,.72);
  --stroke:rgba(255,255,255,.18);
  --stroke-soft:rgba(255,255,255,.08);
  --accent:#0A84FF;
  --radius:22px;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,system-ui;
}

.hidden{display:none}

/* ===== COMMON ===== */
.btn,.card,.timer{
  background:var(--glass);
  backdrop-filter:blur(26px);
  border-radius:var(--radius);
  border:1px solid var(--stroke);
  box-shadow:inset 0 0 0 1px var(--stroke-soft);
}

.btn{
  padding:14px;
  text-align:center;
  color:var(--accent);
  font-size:16px;
  white-space:nowrap;
}
.btn:active{transform:scale(.97)}

.top,.assign{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:14px;
}

.projects{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  padding:6px 14px;
}

.project{
  padding:20px 16px;
}
.project-title{
  font-size:18px;
}
.project-today{
  margin-top:4px;
  font-size:13px;
  color:#aaa;
}

/* ===== TIMER ===== */
.timer-wrap{
  display:flex;
  justify-content:center;
  margin:30px 0 80px;
}
.timer{
  width:260px;
  height:260px;
  border-radius:50%;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  font-weight:600;
}
.timer.active{
  background:rgba(10,132,255,.25);
  border-color:rgba(10,132,255,.55);
  box-shadow:0 0 40px rgba(10,132,255,.35);
}

.timer .time{position:relative;z-index:2}

/* ===== WAVE ===== */
.wave{
  position:absolute;
  left:-50%;
  top:0;
  width:200%;
  height:200%;
  background:
    linear-gradient(
      90deg,
      rgba(10,132,255,.35),
      rgba(10,132,255,.15),
      rgba(10,132,255,.35)
    );
  border-radius:45%;
  opacity:0;
}
.timer.active .wave{
  opacity:1;
  animation:wave 8s linear infinite;
}
@keyframes wave{
  from{transform:translateX(-25%) rotate(0deg)}
  to{transform:translateX(25%) rotate(360deg)}
}

/* ===== BOTTOM ===== */
.bottom{
  position:fixed;
  left:0;right:0;bottom:0;
  padding:14px;
  background:linear-gradient(to top,rgba(0,0,0,.9),rgba(0,0,0,.4));
}

/* ===== PROJECT VIEW ===== */
.header{padding:14px}
.list{
  padding:0 14px 20px;
  display:grid;
  gap:10px;
}
.day-row{
  display:flex;
  justify-content:space-between;
  padding:12px 14px;
  border-radius:14px;
  background:var(--glass);
  border:1px solid var(--stroke-soft);
  font-size:15px;
}
.day-row.active{
  background:rgba(10,132,255,.18);
  border-color:rgba(10,132,255,.55);
  box-shadow:inset 0 0 0 1px rgba(10,132,255,.35);
}

input[type=file]{display:none}
</style>
</head>

<body>

<!-- ===== HOME ===== -->
<div id="home">
  <div class="top">
    <div class="btn" onclick="exportCSV()">Експорт CSV</div>
    <div class="btn" onclick="importCSV()">Імпорт CSV</div>
    <input type="file" id="fileInput">
  </div>

  <div class="projects">
    <div class="card project">
      <div class="project-title">Crypto</div>
      <div class="project-today" id="today-Crypto">Сьогодні 00:00</div>
    </div>
    <div class="card project">
      <div class="project-title">UAPP</div>
      <div class="project-today" id="today-UAPP">Сьогодні 00:00</div>
    </div>
  </div>

  <div class="assign">
    <div class="btn" onclick="assign('Crypto')">Зачислити в Crypto</div>
    <div class="btn" onclick="assign('UAPP')">Зачислити в UAPP</div>
  </div>

  <div class="timer-wrap">
    <div id="mainTimer" class="timer">
      <div class="wave"></div>
      <span class="time">00:00:00</span>
    </div>
  </div>
</div>

<!-- ===== PROJECT ===== -->
<div id="projectView" class="hidden">
  <div class="header">
    <div class="btn" onclick="goHome()">← Назад</div>
  </div>

  <div class="timer-wrap">
    <div id="projectTimer" class="timer">
      <div class="wave"></div>
      <span class="time">00:00:00</span>
    </div>
  </div>

  <div class="list" id="daysList"></div>
</div>

<div class="bottom" id="bottomBar">
  <div class="btn" onclick="openProject('Crypto')">Проєкти</div>
</div>

<script>
/* ===== HELPERS ===== */
const daysUA=["Нд","Пн","Вт","Ср","Чт","Пт","Сб"];
const fmt=t=>{
  const s=Math.floor(t/1000);
  return String(Math.floor(s/3600)).padStart(2,"0")+":"+
         String(Math.floor(s%3600/60)).padStart(2,"0");
};
const fmtFull=t=>{
  const s=Math.floor(t/1000);
  return String(Math.floor(s/3600)).padStart(2,"0")+":"+
         String(Math.floor(s%3600/60)).padStart(2,"0")+":"+
         String(s%60).padStart(2,"0");
};

/* ===== MAIN TIMER ===== */
let main=JSON.parse(localStorage.main||'{"run":false,"t":0,"s":0}');
let raf;
const mainEl=document.getElementById("mainTimer");
function tickMain(){
  const v=main.run?main.t+(Date.now()-main.s):main.t;
  mainEl.querySelector(".time").textContent=fmtFull(v);
  if(main.run)raf=requestAnimationFrame(tickMain);
}
mainEl.onclick=()=>{
  main.run=!main.run;
  mainEl.classList.toggle("active",main.run);
  if(main.run){main.s=Date.now();tickMain()}
  else{main.t+=Date.now()-main.s;cancelAnimationFrame(raf)}
  localStorage.main=JSON.stringify(main);
};
mainEl.classList.toggle("active",main.run);
tickMain();

/* ===== ASSIGN ===== */
function assign(p){
  const d=new Date();
  const key=p+"_"+d.toISOString().slice(0,10);
  const v=(+localStorage[key]||0)+main.t;
  localStorage[key]=v;
  document.getElementById("today-"+p).textContent="Сьогодні "+fmt(v);
  main.t=0;main.run=false;
  mainEl.classList.remove("active");
  localStorage.main=JSON.stringify(main);
  tickMain();
}

/* ===== PROJECT VIEW ===== */
let current=null,ps,pr;
function openProject(p){
  current=p;
  home.classList.add("hidden");
  projectView.classList.remove("hidden");
  bottomBar.classList.add("hidden");
  renderDays();
}
function goHome(){
  projectView.classList.add("hidden");
  home.classList.remove("hidden");
  bottomBar.classList.remove("hidden");
}

function renderDays(){
  const list=document.getElementById("daysList");
  list.innerHTML="";
  Object.keys(localStorage)
    .filter(k=>k.startsWith(current+"_"))
    .sort().reverse()
    .forEach(k=>{
      const d=new Date(k.split("_")[1]);
      const row=document.createElement("div");
      row.className="day-row";
      row.innerHTML=
        `<span>${d.toLocaleDateString("uk-UA",{day:"2-digit",month:"2-digit"})} ${daysUA[d.getDay()]}</span>
         <span>${fmt(+localStorage[k])}</span>`;
      row.onclick=()=>{
        document.querySelectorAll(".day-row").forEach(r=>r.classList.remove("active"));
        row.classList.add("active");
      };
      list.appendChild(row);
    });
}

/* ===== CSV ===== */
function exportCSV(){
  let csv="";
  Object.keys(localStorage).forEach(k=>csv+=k+","+localStorage[k]+"\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv]));
  a.download="work-time.csv";
  a.click();
}
function importCSV(){fileInput.click()}
fileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>{
    r.result.split("\n").forEach(l=>{
      const [k,v]=l.split(",");
      if(k)localStorage[k]=v;
    });
    location.reload();
  };
  r.readAsText(e.target.files[0]);
};
</script>
</body>
</html>
