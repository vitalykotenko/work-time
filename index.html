<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Time</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000">

<style>
:root{
  --bg:#000;
  --card:#1c1c1e;
  --stroke:rgba(255,255,255,.14);
  --stroke-soft:rgba(255,255,255,.08);
  --accent:#0A84FF;
  --text:#fff;
  --radius:22px;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,system-ui;
}

/* ===== COMMON ===== */
.hidden{display:none}

.card{
  background:linear-gradient(180deg,#1f1f22,#161618);
  border-radius:var(--radius);
  border:1px solid var(--stroke);
  box-shadow:
    inset 0 0 0 1px var(--stroke-soft),
    0 10px 30px rgba(0,0,0,.6);
}

.btn{
  padding:14px;
  text-align:center;
  color:var(--accent);
  font-weight:500;
  white-space:nowrap;
}

.btn:active{opacity:.6}

/* ===== TOP ===== */
.top{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  padding:16px;
}

/* ===== PROJECT GRID ===== */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  padding:16px;
}

.project{
  padding:28px 0;
  text-align:center;
  font-size:20px;
  font-weight:600;
}

/* ===== ASSIGN ===== */
.assign{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  padding:0 16px;
}

/* ===== TIMER ===== */
.timer-wrap{
  display:flex;
  justify-content:center;
  margin:40px 0 80px;
}

.timer{
  width:260px;
  height:260px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  font-weight:600;
  letter-spacing:1px;
  line-height:1;
  border:2px solid var(--stroke);
  box-shadow:inset 0 0 0 1px var(--stroke-soft);
}

.timer.active{
  border-color:var(--accent);
  box-shadow:0 0 0 2px rgba(10,132,255,.25);
}

/* ===== HEADER ===== */
.header{
  padding:16px;
}

/* ===== LIST ===== */
.list{
  padding:16px;
  display:grid;
  gap:16px;
}

.plus{
  background:#2a2a2c;
  color:#aaa;
  font-size:32px;
}

/* ===== INPUT ===== */
input{display:none}
</style>
</head>
<body>

<!-- HOME -->
<div id="home">
  <div class="top">
    <div class="card btn" onclick="exportCSV()">Експорт CSV</div>
    <div class="card btn" onclick="importCSV()">Імпорт CSV</div>
    <input type="file" id="file">
  </div>

  <div class="grid">
    <div class="card project" onclick="openStatic('Crypto')">Crypto</div>
    <div class="card project" onclick="openStatic('UAPP')">UAPP</div>
  </div>

  <div class="assign">
    <div class="card btn" onclick="assign('Crypto')">Зачислити в Crypto</div>
    <div class="card btn" onclick="assign('UAPP')">Зачислити в UAPP</div>
  </div>

  <div class="timer-wrap">
    <div id="mainTimer" class="timer">00:00:00</div>
  </div>
</div>

<!-- DYNAMIC PROJECTS -->
<div id="dynamic" class="hidden">
  <div class="header">
    <div class="card btn" onclick="goHome()">← Назад</div>
  </div>
  <div id="dynList" class="list"></div>
</div>

<!-- PROJECT PAGE -->
<div id="project" class="hidden">
  <div class="header">
    <div class="card btn" onclick="backToDynamic()">← Назад</div>
  </div>
  <div class="timer-wrap">
    <div id="projTimer" class="timer">00:00:00</div>
  </div>
</div>

<script>
/* ===== TIMER ENGINE ===== */
function Timer(el,key){
  let running=false,start=0,elapsed=+localStorage.getItem(key)||0,raf;

  const fmt=ms=>{
    const s=Math.floor(ms/1000);
    return `${String(s/3600|0).padStart(2,0)}:${String(s%3600/60|0).padStart(2,0)}:${String(s%60).padStart(2,0)}`;
  };

  const render=()=>{
    el.textContent=fmt(running?elapsed+Date.now()-start:elapsed);
    if(running)raf=requestAnimationFrame(render);
  };

  el.onclick=()=>{
    running=!running;
    el.classList.toggle("active",running);
    if(running){start=Date.now();render();}
    else{
      elapsed+=Date.now()-start;
      localStorage.setItem(key,elapsed);
      cancelAnimationFrame(raf);
    }
  };

  el.textContent=fmt(elapsed);
}

/* ===== MAIN TIMER ===== */
new Timer(document.getElementById("mainTimer"),"main");

/* ===== NAV ===== */
function goHome(){
  home.classList.remove("hidden");
  dynamic.classList.add("hidden");
}

function openStatic(name){
  alert(`Аналітика ${name} — наступний етап`);
}

/* ===== DYNAMIC PROJECTS ===== */
const projects=JSON.parse(localStorage.getItem("projects")||"[]");

function openDynamic(){
  home.classList.add("hidden");
  dynamic.classList.remove("hidden");
  renderDynamic();
}

function renderDynamic(){
  dynList.innerHTML="";
  const plus=document.createElement("div");
  plus.className="card project plus";
  plus.textContent="+";
  plus.onclick=()=>{
    const name="Project "+(projects.length+1);
    projects.push(name);
    localStorage.setItem("projects",JSON.stringify(projects));
    renderDynamic();
  };
  dynList.appendChild(plus);

  projects.forEach(p=>{
    const d=document.createElement("div");
    d.className="card project";
    d.textContent=p;
    d.onclick=()=>openProject(p);
    dynList.appendChild(d);
  });
}

/* ===== PROJECT PAGE ===== */
let currentProject;

function openProject(name){
  currentProject=name;
  dynamic.classList.add("hidden");
  project.classList.remove("hidden");
  document.getElementById("projTimer").textContent="00:00:00";
  new Timer(document.getElementById("projTimer"),"p_"+name);
}

function backToDynamic(){
  project.classList.add("hidden");
  dynamic.classList.remove("hidden");
}

/* ===== CSV ===== */
function exportCSV(){
  let csv="key,value\n";
  Object.keys(localStorage).forEach(k=>csv+=`${k},${localStorage[k]}\n`);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download="work-time.csv";
  a.click();
}

function importCSV(){
  file.click();
}

file.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>r.result.split("\n").slice(1).forEach(l=>{
    if(!l)return;
    const [k,v]=l.split(",");
    localStorage.setItem(k,v);
  });
  r.readAsText(e.target.files[0]);
};
</script>
</body>
</html>
