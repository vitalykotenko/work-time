<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Time</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, system-ui;
  background: #000;
  color: #fff;
  text-align: center;
}

.hidden { display: none; }

/* ===== TOP ===== */
.top {
  padding: 12px;
  border-bottom: 1px solid #1c1c1e;
}

.btn {
  display: inline-block;
  padding: 10px 14px;
  margin: 6px;
  border-radius: 12px;
  background: #1c1c1e;
  color: #0a84ff;
  font-size: 15px;
}

.btn:active { background: #2c2c2e; }

/* ===== PROJECTS ===== */
.projects {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 16px;
}

.project {
  padding: 18px;
  border-radius: 14px;
  background: #1c1c1e;
  font-size: 18px;
}

.project:active { background: #2c2c2e; }

/* ===== ASSIGN ===== */
.assign {
  padding: 8px 16px;
}

/* ===== TIMER ===== */
.timer-wrap {
  display: flex;
  justify-content: center;
  margin-top: 30px;
}

.timer {
  width: 260px;
  height: 260px;
  border-radius: 50%;
  background: #1c1c1e;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 42px;
}

.timer.active {
  background: #1c2a3a;
}

input[type="file"] { display: none; }
</style>
</head>
<body>

<!-- ===== TOP ===== -->
<div class="top">
  <div class="btn" id="exportCSV">Експорт CSV</div>
  <div class="btn" id="importCSV">Імпорт CSV</div>
  <input type="file" id="fileInput" accept=".csv">
</div>

<!-- ===== PROJECTS ===== -->
<div class="projects">
  <div class="project" onclick="openProject('crypto')">Crypto</div>
  <div class="project" onclick="openProject('uapp')">UAPP</div>
</div>

<!-- ===== ASSIGN ===== -->
<div class="assign">
  <div class="btn" onclick="assignTime('crypto')">Зачислити в Crypto</div>
  <div class="btn" onclick="assignTime('uapp')">Зачислити в UAPP</div>
</div>

<!-- ===== TIMER ===== -->
<div class="timer-wrap">
  <div id="timer" class="timer">00:00:00</div>
</div>

<script>
/* ===== STATE ===== */
let running = false;
let startAt = 0;
let elapsed = Number(localStorage.getItem("elapsed")) || 0;
let raf;

/* ===== FORMAT ===== */
function fmt(ms) {
  const s = Math.floor(ms / 1000);
  const h = String(Math.floor(s / 3600)).padStart(2,"0");
  const m = String(Math.floor((s % 3600) / 60)).padStart(2,"0");
  const sec = String(s % 60).padStart(2,"0");
  return `${h}:${m}:${sec}`;
}

/* ===== RENDER ===== */
function render() {
  const now = running ? elapsed + (Date.now() - startAt) : elapsed;
  timer.textContent = fmt(now);
  if (running) raf = requestAnimationFrame(render);
}

/* ===== TIMER LOGIC ===== */
const timer = document.getElementById("timer");

timer.onclick = () => {
  running = !running;
  timer.classList.toggle("active", running);

  if (running) {
    startAt = Date.now();
    render();
  } else {
    elapsed += Date.now() - startAt;
    localStorage.setItem("elapsed", elapsed);
    cancelAnimationFrame(raf);
  }
};

/* ===== ASSIGN ===== */
function assignTime(project) {
  const key = `${project}_${new Date().toISOString().slice(0,10)}`;
  const prev = Number(localStorage.getItem(key)) || 0;
  localStorage.setItem(key, prev + elapsed);

  elapsed = 0;
  localStorage.setItem("elapsed", 0);
  timer.textContent = "00:00:00";
  timer.classList.remove("active");
  running = false;

  alert(`Зачислено в ${project.toUpperCase()}`);
}

/* ===== PROJECT PAGE (stub) ===== */
function openProject(name) {
  alert(`Проєкт: ${name.toUpperCase()} (аналітика буде далі)`);
}

/* ===== CSV ===== */
document.getElementById("exportCSV").onclick = () => {
  let csv = "project,date,ms\n";
  Object.keys(localStorage)
    .filter(k => k.includes("_"))
    .forEach(k => {
      const [p,d] = k.split("_");
      csv += `${p},${d},${localStorage.getItem(k)}\n`;
    });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], {type:"text/csv"}));
  a.download = "work-time.csv";
  a.click();
};

document.getElementById("importCSV").onclick = () =>
  document.getElementById("fileInput").click();

fileInput.onchange = e => {
  const r = new FileReader();
  r.onload = () => {
    r.result.split("\n").slice(1).forEach(l => {
      if (!l) return;
      const [p,d,v] = l.split(",");
      localStorage.setItem(`${p}_${d}`, v);
    });
    alert("Імпортовано");
  };
  r.readAsText(e.target.files[0]);
};

/* ===== INIT ===== */
timer.textContent = fmt(elapsed);
</script>
</body>
</html>
