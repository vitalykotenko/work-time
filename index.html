<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Time</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<style>
:root {
  --bg:#000;
  --card:rgba(28,28,30,.75);
  --stroke:rgba(255,255,255,.18);
  --accent:#0A84FF;
  --text:#fff;
  --radius:20px;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,system-ui;
}

/* ===== COMMON ===== */
.hidden{display:none}
.row{display:flex;gap:12px}
.center{display:flex;justify-content:center}

/* ===== CARD ===== */
.card{
  background:var(--card);
  border-radius:var(--radius);
  border:1px solid var(--stroke);
  backdrop-filter:blur(24px);
  padding:16px;
  text-align:center;
  white-space:nowrap;
}
.card:active{transform:scale(.97)}

/* ===== TOP ===== */
.top{
  padding:14px 16px;
}
.top .row .card{
  flex:1;
  color:var(--accent);
  font-weight:500;
}

/* ===== PROJECTS ===== */
.projects{
  padding:12px 16px;
}
.projects .row .card{
  flex:1;
  font-size:18px;
  padding:22px 0;
}

/* ===== ASSIGN ===== */
.assign{
  padding:0 16px 10px;
}
.assign .row .card{
  flex:1;
  color:var(--accent);
}

/* ===== TIMER ===== */
.timer-wrap{
  margin:40px 0 60px;
  display:flex;
  justify-content:center;
}
.timer{
  width:260px;
  height:260px;
  border-radius:50%;
  border:1.5px solid var(--stroke);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:42px;
  font-weight:600;
}
.timer.active{
  border-color:var(--accent);
  box-shadow:0 0 0 1px rgba(10,132,255,.4);
}

/* ===== SCREENS ===== */
.screen{
  min-height:100vh;
}

/* ===== DYNAMIC ===== */
.dynamic-list{
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.add{
  background:rgba(255,255,255,.12);
  color:#aaa;
  font-size:22px;
}
.back{
  color:var(--accent);
}
</style>
</head>

<body>

<!-- ================= HOME ================= -->
<div id="home" class="screen">

  <div class="top">
    <div class="row">
      <div class="card" onclick="exportCSV()">Експорт CSV</div>
      <div class="card" onclick="importCSV()">Імпорт CSV</div>
      <input type="file" id="fileInput" hidden>
    </div>
  </div>

  <div class="projects">
    <div class="row">
      <div class="card">Crypto</div>
      <div class="card">UAPP</div>
    </div>
  </div>

  <div class="assign">
    <div class="row">
      <div class="card">Зачислити в Crypto</div>
      <div class="card">Зачислити в UAPP</div>
    </div>
  </div>

  <div class="timer-wrap">
    <div id="mainTimer" class="timer">00:00:00</div>
  </div>

</div>

<!-- ================= DYNAMIC PROJECTS ================= -->
<div id="dynamic" class="screen hidden">

  <div class="top">
    <div class="card back" onclick="goHome()">← Назад</div>
  </div>

  <div class="dynamic-list" id="dynamicList">
    <div class="card add" onclick="addProject()">＋</div>
  </div>

</div>

<!-- ================= PROJECT ================= -->
<div id="project" class="screen hidden">

  <div class="top">
    <div class="card back" onclick="backToDynamic()">← Назад</div>
  </div>

  <div class="timer-wrap">
    <div id="projectTimer" class="timer">00:00:00</div>
  </div>

</div>

<script>
/* ===== STATE ===== */
let running=false,start=0,elapsed=0,raf;
let currentProject=null;

/* ===== TIMER CORE ===== */
function fmt(ms){
  const s=Math.floor(ms/1000);
  return [
    String(Math.floor(s/3600)).padStart(2,"0"),
    String(Math.floor(s%3600/60)).padStart(2,"0"),
    String(s%60).padStart(2,"0")
  ].join(":");
}

function run(timerEl){
  const now=running?elapsed+(Date.now()-start):elapsed;
  timerEl.textContent=fmt(now);
  if(running)raf=requestAnimationFrame(()=>run(timerEl));
}

function toggle(timerEl){
  running=!running;
  timerEl.classList.toggle("active",running);
  if(running){start=Date.now();run(timerEl);}
  else{elapsed+=Date.now()-start;cancelAnimationFrame(raf);}
}

/* ===== MAIN TIMER ===== */
const mainTimer=document.getElementById("mainTimer");
mainTimer.onclick=()=>toggle(mainTimer);

/* ===== PROJECT TIMER ===== */
const projectTimer=document.getElementById("projectTimer");
projectTimer.onclick=()=>toggle(projectTimer);

/* ===== NAV ===== */
function openDynamic(){
  home.classList.add("hidden");
  dynamic.classList.remove("hidden");
}
function goHome(){
  dynamic.classList.add("hidden");
  home.classList.remove("hidden");
}
function openProject(name){
  currentProject=name;
  dynamic.classList.add("hidden");
  project.classList.remove("hidden");
}
function backToDynamic(){
  project.classList.add("hidden");
  dynamic.classList.remove("hidden");
}

/* ===== DYNAMIC PROJECTS ===== */
function addProject(){
  const name=prompt("Назва проєкту");
  if(!name)return;
  const d=document.createElement("div");
  d.className="card";
  d.textContent=name;
  d.onclick=()=>openProject(name);
  dynamicList.appendChild(d);
}

/* ===== CSV ===== */
function exportCSV(){
  let csv="project,ms\n";
  Object.keys(localStorage).forEach(k=>{
    csv+=`${k},${localStorage[k]}\n`;
  });
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download="work-time.csv";
  a.click();
}
function importCSV(){
  fileInput.click();
}
fileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>alert("Імпортовано");
  r.readAsText(e.target.files[0]);
};

/* ===== SWIPE ===== */
let sx=0,sy=0;
document.addEventListener("touchstart",e=>{
  sx=e.touches[0].clientX;
  sy=e.touches[0].clientY;
},{passive:true});

document.addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-sx;
  const dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)<60||Math.abs(dx)<Math.abs(dy))return;

  if(dx<0 && !home.classList.contains("hidden"))openDynamic();
  if(dx>0 && !dynamic.classList.contains("hidden"))goHome();
});
</script>

</body>
</html>
